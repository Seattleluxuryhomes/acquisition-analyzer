<!DOCTYPE html>
<!--
  BIDTRANSLATOR — Phase 1 front end. Same UI/flow/visual language as the prototype,
  refactored onto the hosted backend:
    - Accounts + sign-in (replaces local-only persistence).
    - Offline-first store: every capture/edit writes locally first (instant, works
      offline) and syncs to the server when a connection is available (last-write-wins).
    - aiExtract() is gone — the AI build calls the server's /api/assist/build, so the
      provider key never touches the browser.
    - margin/notes never reach the PDF (the server builds it) and aren't shown to clients.
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bidtranslator</title>
<link rel="icon" type="image/png" href="/brand-orange.png" />
<link rel="apple-touch-icon" href="/brand-tile.png" />
<meta name="theme-color" content="#CF7F18" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    /* Fixed brand tokens — identical in both themes. --ink/--paper are used as
       fixed "ink on light" / "light on dark" (e.g. the client proposal preview
       and text on the amber accent), so they must NOT flip with the theme. */
    --ink:#1F252C;--paper:#F3EEE3;
    --kraft:#E7D8B6;--kraft-deep:#D9C599;
    --amber:#EE9B2E;--amber-deep:#CF7F18;
    --blueprint:#2E5C7E;--blueprint-deep:#1E4259;--rust:#A94E38;
    --ok:#3E7D5A;
    --line-ink:rgba(31,37,44,.16);
    /* Theme tokens — DARK is the default; body.light remaps them. Orange and the
       status colors stay constant across both. */
    --bg:#1F252C;--surface:#252D36;--surface2:#2A323B;
    --text:#F3EEE3;--muted:#9AA3AE;--line:rgba(243,238,227,.14);
    --topbar:var(--topbar);--shadow:0 1px 2px rgba(0,0,0,.18);
  }
  body.light{
    --bg:#F1EEE7;--surface:#FFFFFF;--surface2:#F6F3EC;
    --text:#1F252C;--muted:#6B7280;--line:rgba(31,37,44,.12);
    --topbar:rgba(255,255,255,.93);--shadow:0 1px 3px rgba(31,37,44,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"IBM Plex Sans",system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5;transition:background .2s,color .2s}
  .mono{font-family:"IBM Plex Mono",monospace}
  .display{font-family:"Archivo",sans-serif;font-weight:800;letter-spacing:-.01em}
  input,select,textarea,button{font-family:inherit;font-size:1rem}
  button{cursor:pointer}
  .app{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;overflow-x:clip}

  .top{position:sticky;top:0;z-index:40;background:var(--topbar);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .top-in{display:flex;align-items:center;justify-content:space-between;padding:12px 18px}
  .brand{display:flex;align-items:center;gap:9px;font-family:"Archivo";font-weight:800;font-size:1rem}
  .brand .mark{width:22px;height:22px;border-radius:4px;background:var(--amber);display:flex;align-items:center;justify-content:center}
  .mark img{width:74%;height:74%;object-fit:contain;display:block}
  .brand b2{color:var(--amber)}
  .top-actions{display:flex;gap:6px;align-items:center}
  .icon-btn{background:transparent;border:1px solid var(--line);color:var(--text);border-radius:6px;padding:7px 12px;font-family:"IBM Plex Mono";font-size:.74rem;letter-spacing:.03em}
  .icon-btn:hover{border-color:var(--amber);color:var(--amber)}
  .icon-btn.active{background:var(--amber);color:var(--ink);border-color:var(--amber)}
  .icon-btn .ni{display:none}
  .setupnudge{display:block;width:100%;text-align:left;background:rgba(207,127,24,.14);border:1px solid var(--amber);color:var(--text);border-radius:10px;padding:13px 15px;font-size:.9rem;margin:0 0 14px;cursor:pointer;line-height:1.4}
  .setupnudge .nudge-go{color:var(--amber);font-weight:700;white-space:nowrap}
  /* notifications: bell badge + dashboard "good news" banner */
  .icon-btn.bell{position:relative}
  .icon-btn .badge{position:absolute;top:-6px;right:-6px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:var(--rust);color:#fff;font-size:.6rem;font-weight:700;line-height:16px;text-align:center;font-family:system-ui}
  .newsbanner{background:rgba(62,125,90,.14);border:1px solid #3e7d5a;border-radius:11px;padding:11px 14px;margin:0 0 14px;overflow:hidden}
  .news-row{position:relative;border-top:1px solid rgba(126,214,163,.18);touch-action:pan-y}
  .news-row:first-of-type{border-top:none}
  .news-x{position:absolute;top:50%;right:0;transform:translateY(-50%);background:transparent;border:none;color:var(--muted);font-size:.82rem;padding:8px 6px;cursor:pointer;line-height:1}
  .news-x:hover{color:var(--text)}
  .news-h{font-family:"IBM Plex Mono";font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ok);margin-bottom:6px}
  .news-count{color:#fff;background:#3e7d5a;border-radius:8px;padding:1px 7px;font-size:.64rem}
  .news-item{display:block;width:100%;text-align:left;background:transparent;border:none;padding:9px 30px 9px 2px;cursor:pointer}
  .news-t{font-size:.95rem;color:var(--text)}
  .news-item.unread .news-t::after{content:'NEW';margin-left:8px;background:var(--amber);color:var(--ink);border-radius:5px;padding:1px 5px;font-size:.58rem;font-weight:700;vertical-align:middle;font-family:"IBM Plex Mono"}
  .news-s{font-size:.76rem;color:var(--muted);margin-top:2px}

  /* sync + offline status */
  .sync{display:inline-flex;align-items:center;gap:6px;font-family:"IBM Plex Mono";font-size:.66rem;letter-spacing:.04em;color:var(--muted);padding:5px 9px;border:1px solid var(--line);border-radius:6px}
  .sync .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .sync.online .dot{background:var(--ok)}
  .sync.offline .dot{background:var(--amber-deep)}
  .sync.saving .dot{background:var(--blueprint);animation:pulse 1s infinite}
  .offline-banner{background:rgba(207,127,24,.16);border-bottom:1px solid var(--amber-deep);color:var(--text);font-family:"IBM Plex Mono";font-size:.74rem;text-align:center;padding:7px 12px}
  .trial-chip{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-family:"IBM Plex Mono";font-size:.66rem;letter-spacing:.04em;color:var(--ink);background:var(--amber);border:none;border-radius:6px;padding:6px 10px;font-weight:600}
  .trial-chip.warn{background:var(--rust);color:#fff}
  /* Keep the top bar on one tidy line on phones. */
  @media (max-width:480px){
    .top-in{padding:10px 13px}
    .brand{font-size:.92rem;gap:7px;min-width:0;flex-shrink:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .brand .mark{width:20px;height:20px;flex-shrink:0}
    .top-actions{gap:5px;flex-shrink:0}
    .sync{display:none}
    .icon-btn{padding:6px 9px;font-size:.72rem}
    .icon-btn .nl{display:none}
    .icon-btn .ni{display:inline;font-size:1.02rem}
    .trial-chip{font-size:.62rem;padding:5px 8px}
  }

  /* billing / paywall */
  .pricecard{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:24px;margin-top:18px;text-align:center}
  .pricecard .amt{font-family:"Archivo";font-weight:900;font-size:2.6rem;letter-spacing:-.02em;margin:6px 0}
  .pricecard .amt span{font-family:"IBM Plex Mono";font-size:.9rem;font-weight:500;color:var(--muted)}
  .feat{list-style:none;text-align:left;max-width:340px;margin:16px auto;display:flex;flex-direction:column;gap:9px}
  .feat li{font-size:.92rem;padding-left:24px;position:relative}
  .feat li::before{content:"\2713";position:absolute;left:0;color:var(--ok);font-weight:700}
  .pricecard.soon{position:relative;border-style:dashed;opacity:.96;margin-top:14px}
  .pricecard.soon .amt{font-size:2.1rem;color:var(--muted)}
  .soonflag{position:absolute;top:14px;right:14px;font-family:"IBM Plex Mono";font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;background:var(--blueprint-deep);color:#cfe3f0;padding:4px 9px;border-radius:20px}
  .billbox{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:16px;margin-top:18px}
  .billbox h3{font-family:"IBM Plex Mono";font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
  .statline{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .badge{font-family:"IBM Plex Mono";font-size:.7rem;padding:3px 9px;border-radius:4px}
  .badge.active{background:rgba(62,125,90,.2);color:#8fd0a8}
  .badge.trial{background:rgba(207,127,24,.2);color:var(--text)}
  .badge.none{background:rgba(154,163,174,.15);color:var(--muted)}
  .badge.past_due,.badge.canceled{background:rgba(169,78,56,.2);color:#e3a08f}
  .paybox{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:16px;margin-top:18px}
  .paybox h3{font-family:"IBM Plex Mono";font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
  .paylist{margin-top:14px;border-top:1px solid var(--line);padding-top:6px}
  .payrow{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;padding:9px 0;border-bottom:1px solid var(--line)}
  .payrow .payamt{font-family:"IBM Plex Mono";font-weight:600;color:var(--text);margin-bottom:4px}
  .payact{display:flex;gap:8px;flex-wrap:wrap}

  main{flex:1;padding:18px}

  .btn{background:var(--amber);color:var(--ink);border:none;border-radius:6px;padding:13px 18px;font-family:"IBM Plex Mono";font-weight:600;font-size:.9rem;transition:transform .12s,background .12s}
  .btn:hover{background:#FFB347;transform:translateY(-1px)}
  .btn:disabled{opacity:.5;cursor:default;transform:none}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--amber);color:var(--amber);background:transparent}
  .btn.blue{background:var(--blueprint);color:#fff}
  .btn.blue:hover{background:#3a6e95}
  .btn.full{width:100%;display:block}
  .btn.sm{padding:8px 12px;font-size:.78rem}

  .h-eyebrow{font-family:"IBM Plex Mono";font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--amber)}
  h1.page{font-family:"Archivo";font-weight:900;font-size:1.7rem;margin:6px 0 4px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:.92rem}

  .newbar{display:flex;justify-content:space-between;align-items:center;margin:18px 0 14px;gap:12px;flex-wrap:wrap}
  .joblist{display:flex;flex-direction:column;gap:10px}
  .jobcard{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:15px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;text-align:left;width:100%;color:var(--text)}
  .jobcard:hover{border-color:var(--amber)}
  .jobcard .jt{font-family:"Archivo";font-weight:700;font-size:1.02rem}
  .jobcard .jm{font-family:"IBM Plex Mono";font-size:.72rem;color:var(--muted);margin-top:3px}
  .jobcard .chev{color:var(--amber);font-family:"IBM Plex Mono"}
  .langtag{display:inline-block;font-family:"IBM Plex Mono";font-size:.62rem;letter-spacing:.06em;background:var(--blueprint-deep);color:#cfe3f0;padding:2px 7px;border-radius:3px;margin-left:6px}
  .pendtag{display:inline-block;font-family:"IBM Plex Mono";font-size:.62rem;letter-spacing:.06em;background:rgba(207,127,24,.2);color:var(--text);padding:2px 7px;border-radius:3px;margin-left:6px}
  /* Pipeline: filter chips + status badges + stage selector */
  .fchips{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 14px}
  .fchip{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:20px;padding:6px 11px;font-family:"IBM Plex Mono";font-size:.72rem;display:inline-flex;align-items:center;gap:6px}
  .fchip.on{background:var(--amber);color:var(--ink);border-color:var(--amber)}
  .fchip .fc{font-weight:700;opacity:.85}
  .sbadge{font-family:"IBM Plex Mono";font-size:.6rem;letter-spacing:.05em;text-transform:uppercase;padding:4px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0}
  .sbadge.draft{background:rgba(154,163,174,.15);color:var(--muted)}
  .sbadge.sent{background:rgba(207,127,24,.2);color:var(--text)}
  .sbadge.signed{background:rgba(62,125,90,.22);color:#8fd0a8}
  .sbadge.scheduled{background:rgba(30,66,89,.45);color:#9fc2da}
  .stagebar{display:flex;gap:5px;margin:12px 0 2px;background:var(--surface2);padding:5px;border-radius:9px;border:1px solid var(--line);flex-wrap:wrap}
  .stbtn{flex:1;min-width:64px;background:transparent;border:none;color:var(--muted);padding:8px 6px;border-radius:6px;font-family:"IBM Plex Mono";font-size:.7rem;letter-spacing:.03em}
  .stbtn.on{background:var(--blueprint-deep);color:#cfe3f0;font-weight:600}
  .schedrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:10px 0 2px;background:var(--surface2);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
  .schedlbl{font-family:"IBM Plex Mono";font-size:.74rem;color:#9fc2da}
  .schedinput{background:var(--surface);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:8px 10px;font-size:.9rem;color-scheme:dark}
  .schedwarn{margin:8px 0 2px;background:rgba(196,90,52,.16);border:1px solid var(--rust);border-radius:8px;padding:9px 12px;font-family:"IBM Plex Mono";font-size:.72rem;color:#ffb59a;line-height:1.4}
  .datetag{display:inline-block;font-family:"IBM Plex Mono";font-size:.62rem;letter-spacing:.04em;background:rgba(30,66,89,.45);color:#9fc2da;padding:2px 7px;border-radius:3px;margin-left:6px}
  .addrrow{margin:10px 0 2px}
  .addrinput{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:10px 12px;font-size:.92rem}
  .jobtitle-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--text);font-family:"Archivo";font-weight:900;font-size:1.4rem;letter-spacing:-.02em;padding:2px 0 6px}
  .jobtitle-input:focus{outline:none;border-bottom-color:var(--amber)}
  .jobtitle-input::placeholder{color:var(--muted);font-weight:600;font-size:.95rem;font-family:"IBM Plex Sans"}
  .addrresolved{background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:.92rem;color:var(--text)}
  .addrresolved .addrok{color:#8fd0a8;font-size:.76rem;font-family:"IBM Plex Mono"}
  .linklike{background:transparent;border:none;color:var(--amber);font-size:.78rem;padding:6px 0 2px;cursor:pointer;font-family:"IBM Plex Mono"}
  .addrlinks{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .maplink{font-family:"IBM Plex Mono";font-size:.72rem;text-decoration:none;background:var(--blueprint-deep);color:#cfe3f0;padding:7px 11px;border-radius:6px;border:1px solid var(--line)}
  .routecard{display:flex;align-items:stretch;gap:8px;margin-bottom:10px}
  .routecard .routemain{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:14px 15px;text-align:left;color:var(--text)}
  .routecard .routemain .jt{font-family:"Archivo";font-weight:700;font-size:1rem}
  .routecard .routemain .jm{font-family:"IBM Plex Mono";font-size:.72rem;color:var(--muted);margin-top:3px}
  .routedir{display:flex;align-items:center;justify-content:center;min-width:54px;font-size:1.1rem;text-decoration:none}
  /* ===== Dashboard ===== */
  .dash-hello{margin:6px 0 14px}
  .kpis{display:flex;flex-direction:column;gap:11px;margin:2px 0 20px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px 16px;display:flex;gap:13px;align-items:flex-start;box-shadow:var(--shadow)}
  .kpi-ic{flex:0 0 auto;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--surface2);color:var(--muted)}
  .kpi-txt{min-width:0}
  .kpi-l{font-family:"IBM Plex Mono";font-size:.62rem;letter-spacing:.09em;text-transform:uppercase;color:var(--muted)}
  .kpi-v{font-family:"Archivo";font-weight:900;font-size:1.6rem;letter-spacing:-.025em;line-height:1.04;margin-top:3px;color:var(--text)}
  .kpi-s{font-family:"IBM Plex Mono";font-size:.62rem;color:var(--muted);margin-top:4px}
  /* Revenue is the hero metric of the dashboard. */
  .kpi.hero{padding:18px 18px;border-color:rgba(62,125,90,.35)}
  .kpi.hero .kpi-ic{width:46px;height:46px;background:rgba(62,125,90,.16);color:#6fce93}
  .kpi.hero .kpi-v{font-size:2.4rem}
  .kpi.rev .kpi-v{color:#6fce93}
  .kpi-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}
  .kpi-grid .kpi{padding:14px;min-width:0;overflow:hidden}
  .kpi.won .kpi-ic{color:#6fce93} .kpi.pend .kpi-ic,.kpi.close .kpi-ic{color:var(--amber)}
  .kpi.close .kpi-v{color:var(--text)}
  .kpi.foll.alert{border-color:var(--rust)}
  .kpi.foll.alert .kpi-ic{color:#ff9b7a;background:rgba(169,78,56,.16)} .kpi.foll.alert .kpi-v{color:#ff9b7a}
  .ico{display:inline-block;vertical-align:-.14em}
  /* Celebrations — fire once on a customer win; toggleable + reduced-motion aware. */
  #celebrate{position:fixed;inset:0;z-index:1200;display:none;align-items:center;justify-content:center;pointer-events:none}
  #celebrate canvas{position:absolute;inset:0;width:100%;height:100%}
  .celebrate-card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px 26px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.45);animation:popin .3s cubic-bezier(.2,.9,.3,1.3)}
  .celebrate-card .cc-ic{width:54px;height:54px;border-radius:15px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;background:rgba(62,125,90,.18);color:#6fce93}
  .celebrate-card .cc-ic.pay{background:rgba(207,127,24,.2);color:var(--amber)}
  .celebrate-card .cc-t{font-family:"Archivo";font-weight:800;font-size:1.22rem;letter-spacing:-.01em}
  .celebrate-card .cc-s{color:var(--muted);font-family:"IBM Plex Mono";font-size:.78rem;margin-top:5px}
  @keyframes popin{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:none}}
  .panel-title{display:inline-flex;align-items:center;gap:7px}
  /* Price book */
  .skutools{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .skuimg{position:relative;margin-top:10px;display:inline-block}
  .skuimg img{max-width:100%;max-height:200px;border-radius:10px;border:1px solid var(--line)}
  .skuimg .del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer}
  .skurow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line)}
  .skuthumb-wrap{position:relative;flex:0 0 auto}
  .skurow .skuthumb{width:46px;height:46px;border-radius:8px;border:1px solid var(--line);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;overflow:hidden;padding:0;-webkit-tap-highlight-color:transparent}
  .skurow .skuthumb.has{border-color:var(--amber)}
  .skurow .skuthumb img{width:100%;height:100%;object-fit:cover;display:block}
  .skuthumb-wrap .thumbx{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;border:none;background:var(--rust);color:#fff;font-size:.62rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
  .skurow .skuinfo{flex:1;min-width:0}
  .skurow .skuname{font-weight:600;font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .skurow .skuname-in{flex:1;min-width:0;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:8px 9px;font-size:.86rem}
  .skurow .skumeta{font-family:"IBM Plex Mono";font-size:.66rem;color:var(--muted);margin-top:2px}
  .skurow .mini{background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:8px 9px;font-family:"IBM Plex Mono";font-size:.8rem}
  .skurow .skuprice{width:88px;text-align:right;color:var(--amber);font-weight:600;flex:0 0 auto}
  .skurow .del{background:none;border:none;color:var(--muted);font-size:.95rem;cursor:pointer;flex:0 0 auto;padding:4px}
  .sheet.picker{max-height:74vh;display:flex;flex-direction:column}
  .picklist{overflow-y:auto;margin-top:8px}
  .pickitem{display:flex;justify-content:space-between;align-items:center;gap:12px;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);color:var(--text);padding:14px 6px;cursor:pointer;font-size:.95rem}
  .pickitem:active{background:rgba(243,238,227,.06)}
  .pickitem .pp{font-family:"IBM Plex Mono";font-size:.8rem;color:var(--amber);white-space:nowrap}
  .pickitem .pn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pickthumb{width:38px;height:38px;border-radius:7px;object-fit:cover;flex:0 0 auto;border:1px solid var(--line)}
  .pickthumb.none{display:flex;align-items:center;justify-content:center;background:var(--surface2);font-size:.95rem}
  .viz-overlay{position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;padding:24px}
  .viz-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:24px 26px;text-align:center;max-width:300px}
  .viz-card .viz-msg{margin-top:6px;font-size:.95rem;color:var(--text)}
  .viz-result{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;max-width:460px;width:100%;margin:0 14px}
  .viz-result img{width:100%;border-radius:10px;display:block}
  .viz-cap{font-family:"IBM Plex Mono";font-size:.7rem;color:var(--muted);text-align:center;margin:10px 0}
  .viz-err{background:rgba(169,78,56,.14);border:1px solid var(--rust);color:var(--text);border-radius:10px;padding:14px;font-size:.9rem;margin-bottom:10px}
  .news-ic{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:rgba(62,125,90,.18);color:#6fce93;margin-right:8px;vertical-align:-.35em}
  .news-ic.pay{background:rgba(207,127,24,.18);color:var(--amber)}
  @media(min-width:720px){ .kpis{display:grid;grid-template-columns:1fr 1fr;align-items:start} .kpi.hero{grid-column:1/-1} }
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:8px;margin-bottom:14px}
  .panel-h{width:100%;display:flex;justify-content:space-between;align-items:center;background:transparent;border:none;color:var(--text);font-family:"IBM Plex Mono";font-size:.78rem;padding:8px}
  .panel-h.static{cursor:default}
  .panel-link{color:var(--amber);font-size:.72rem}
  .sch-item{display:flex;gap:8px;align-items:stretch;padding:0 2px}
  .sch-main{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;text-align:left;color:var(--text);margin-bottom:6px;min-width:0}
  .sch-t{font-family:"Archivo";font-weight:700;font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sch-s{font-family:"IBM Plex Mono";font-size:.68rem;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sch-dir{display:flex;align-items:center;justify-content:center;min-width:46px;margin-bottom:6px;background:rgba(238,155,46,.15);border:1px solid var(--amber-deep);border-radius:8px;text-decoration:none;font-size:1.05rem;color:var(--amber)}
  .act-item{width:100%;text-align:left;background:transparent;border:none;border-top:1px solid var(--line);color:var(--text);padding:9px 8px}
  .act-t{font-family:"Archivo";font-weight:600;font-size:.9rem}
  .act-s{font-family:"IBM Plex Mono";font-size:.66rem;color:var(--muted);margin-top:2px}
  .jcard{display:flex;align-items:stretch;gap:8px;margin-bottom:10px}
  .jcard-main{flex:1;display:flex;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px;text-align:left;color:var(--text);min-width:0}
  .jcard-photo{flex:0 0 64px;width:64px;height:64px;border-radius:8px;background-size:cover;background-position:center;background-color:var(--surface2)}
  .jcard-photo.noimg{display:flex;align-items:center;justify-content:center;font-size:1.5rem;opacity:.45}
  .jcard-info{flex:1;min-width:0}
  .jcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .jcard-top .jt{font-family:"Archivo";font-weight:700;font-size:1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .jcard-val{font-family:"Archivo";font-weight:900;font-size:1.15rem;color:#8fd0a8;margin:2px 0}
  .jcard-meta{font-family:"IBM Plex Mono";font-size:.68rem;color:#cfe3f0;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .jcard-meta.dim,.jcard-meta .dim{color:var(--muted)}
  .jcard-actions{display:flex;flex-direction:column;gap:6px;justify-content:center}
  .qa{display:flex;align-items:center;justify-content:center;width:42px;flex:1;min-height:30px;background:var(--surface2);border:1px solid var(--line);border-radius:8px;color:var(--text);text-decoration:none;font-size:1rem}
  .weekgrid{display:flex;flex-direction:column;gap:10px;margin-top:12px}
  .wk-day{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
  .wk-day.today{border-color:var(--amber)}
  .wk-h{font-family:"IBM Plex Mono";font-size:.72rem;letter-spacing:.04em;color:var(--amber);margin-bottom:8px}
  .wk-empty{font-family:"IBM Plex Mono";font-size:.7rem;color:var(--muted);padding:2px}
  .frow{position:relative;display:flex;align-items:center;gap:8px;padding:9px 8px;border-top:1px solid var(--line)}
  .fbar{position:absolute;left:0;top:0;bottom:0;background:rgba(207,127,24,.16);border-right:2px solid var(--amber);border-radius:0 6px 6px 0;z-index:0}
  .flabel{position:relative;z-index:1;flex:1;font-family:"IBM Plex Mono";font-size:.78rem;color:var(--text)}
  .fval{position:relative;z-index:1;font-family:"Archivo";font-weight:800;font-size:1rem}
  .fdrop{font-family:"IBM Plex Mono";font-size:.64rem;color:#ff9b7a;font-weight:400}
  .subpill{font-family:"IBM Plex Mono";font-size:.56rem;background:rgba(62,125,90,.22);color:#8fd0a8;padding:2px 6px;border-radius:4px;margin-left:4px;text-transform:uppercase}
  @media(min-width:720px){ .kpi{flex:1 1 0} }
  .empty{text-align:center;padding:54px 20px;border:1px dashed var(--line);border-radius:10px}
  .empty .big{font-family:"Archivo";font-weight:800;font-size:1.2rem;margin-bottom:6px}

  label.fld{display:block;margin:16px 0 6px;font-family:"IBM Plex Mono";font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .input,textarea.input,select.input{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:12px 13px}
  .input:focus,textarea.input:focus,select.input:focus{outline:2px solid var(--amber);outline-offset:1px;border-color:transparent}
  textarea.input{min-height:150px;resize:vertical;line-height:1.55}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row2 label.fld{margin-top:16px}

  .nb-sec{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:16px;margin-bottom:12px}
  .nb-sec h3{font-family:"IBM Plex Mono";font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
  .nb-sec p{font-size:.95rem}
  .nb-sec .quote{font-style:italic;color:#cdc7bb}
  .nb-list{list-style:none;display:flex;flex-direction:column;gap:7px}
  .nb-list li{font-size:.92rem;padding-left:16px;position:relative}
  .nb-list li::before{content:"–";position:absolute;left:0;color:var(--blueprint)}
  .nb-list.excl li::before{content:"\2717";color:var(--rust)}
  .nb-list.up li::before{content:"+";color:var(--amber)}
  .editarea{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:10px 12px;line-height:1.55;min-height:70px;resize:vertical;margin-top:4px}
  .machine-tag{display:inline-block;font-family:"IBM Plex Mono";font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--blueprint);border:1px solid var(--blueprint);border-radius:3px;padding:1px 6px;margin-left:8px;vertical-align:middle}

  .line{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:13px;margin-bottom:10px}
  .line .ltop{display:flex;gap:8px;align-items:flex-start}
  .line .ldesc{flex:1;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:9px 10px;font-size:.92rem}
  .line .del{background:transparent;border:none;color:var(--muted);font-size:1.1rem;padding:4px 8px}
  .line .del:hover{color:var(--rust)}
  .line .lroom{margin-top:9px}
  .line .lroom input{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:7px 9px;font-family:"IBM Plex Mono";font-size:.74rem}
  .secgroup{margin-bottom:14px}
  .sechead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:6px 0 8px;font-family:"IBM Plex Mono";font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--amber)}
  .sechead .secsub{color:var(--text);font-weight:600}
  .csec{margin-bottom:8px}
  .csec-h{font-family:"IBM Plex Mono";font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--blueprint-deep,#1E4259);margin:14px 0 4px;font-weight:700}
  .cline.csub{border-bottom:none}
  .cline.csub .cd{color:#8a7f68;font-style:italic}
  .cline.csub .ca{color:#5a5240}
  .line .lctl{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:9px}
  .line .lctl>.mini{flex:1 1 70px;min-width:0}
  .line .lctl .ltype{flex:0 0 auto;width:auto}
  .line .lctl .lt-amt{flex:0 0 auto;margin-left:auto}
  .line select.mini,.line input.mini{background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:8px 9px;font-family:"IBM Plex Mono";font-size:.8rem;width:100%}
  .line .lt-amt{text-align:right;font-family:"IBM Plex Mono";font-weight:600;color:var(--amber);white-space:nowrap;font-size:.9rem}
  .furn{display:flex;gap:6px;margin-top:9px}
  .furn button{flex:1;background:var(--surface2);border:1px solid var(--line);color:var(--muted);border-radius:6px;padding:7px;font-family:"IBM Plex Mono";font-size:.72rem}
  .furn button.on{background:var(--blueprint);color:#fff;border-color:var(--blueprint)}

  .totbar{background:var(--surface2);border:1px solid var(--line);border-radius:9px;padding:14px 16px;margin:14px 0;display:flex;justify-content:space-between;align-items:center}
  .totbar .tl{font-family:"IBM Plex Mono";font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .totbar .tv{font-family:"Archivo";font-weight:900;font-size:1.6rem;color:var(--amber)}
  .private{background:rgba(46,92,126,.14);border:1px solid var(--blueprint);border-radius:8px;padding:12px 14px;margin-bottom:12px}
  .depositbox{background:rgba(62,125,90,.12);border:1px solid #3e7d5a;border-radius:8px;padding:12px 14px;margin-bottom:12px}
  .amtquick{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .private .pl{font-family:"IBM Plex Mono";font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--blueprint)}

  /* The proposal preview mirrors what the CLIENT sees — always the paper look in
     either app theme. Scope --text to paper so the dark header's text stays light. */
  .client{background:var(--paper);color:var(--ink);border-radius:10px;padding:0;overflow:hidden;border:1px solid var(--kraft-deep);--text:var(--paper)}
  .client-head{background:var(--ink);color:var(--text);padding:28px 24px;text-align:center;border-bottom:3px solid var(--amber)}
  .client-head .client-logo{max-height:60px;max-width:72%;margin:0 auto 8px;display:block;border-radius:4px}
  .client-head .co{font-family:"Archivo";font-weight:800;font-size:1.4rem}
  .client-head .meta{font-family:"IBM Plex Mono";font-size:.74rem;color:#b9c2cc;margin-top:6px}
  .logo-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:2px 0 6px}
  .logo-preview{max-height:54px;max-width:170px;background:#fff;border:1px solid var(--line);border-radius:6px;padding:4px}
  .logo-empty{font-family:"IBM Plex Mono";font-size:.74rem;color:var(--muted);border:1px dashed var(--line);border-radius:6px;padding:14px 18px}
  .client-body{padding:22px 24px}
  .client-body h4{font-family:"IBM Plex Mono";font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--blueprint);margin:18px 0 10px}
  .client-body h4:first-child{margin-top:0}
  .cline{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--line-ink);font-size:.95rem}
  .cline .cd{color:var(--ink)}
  .cline .cd small{display:block;color:#8a7f68;font-family:"IBM Plex Mono";font-size:.68rem;margin-top:2px}
  .cline .ca{font-family:"IBM Plex Mono";font-weight:600;white-space:nowrap}
  .ctotal{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:14px;border-top:2px solid var(--ink)}
  .ctotal .l{font-family:"Archivo";font-weight:800;font-size:1.05rem}
  .ctotal .v{font-family:"Archivo";font-weight:900;font-size:1.5rem;color:var(--blueprint-deep)}
  .cup{display:flex;justify-content:space-between;gap:14px;padding:8px 0;font-size:.92rem;color:#3a424c;border-bottom:1px dashed var(--line-ink)}
  .cup .ca{font-family:"IBM Plex Mono";font-weight:600;color:var(--amber-deep)}
  .cnote{font-family:"IBM Plex Mono";font-size:.72rem;color:#8a7f68;margin-top:5px}
  .cexcl{font-size:.88rem;color:#5a5240;padding-left:15px;position:relative;margin-top:6px}
  .cexcl::before{content:"\2717";position:absolute;left:0;color:var(--rust)}
  .cfoot{font-family:"IBM Plex Mono";font-size:.7rem;color:#8a7f68;border-top:1px solid var(--line-ink);padding:14px 24px;background:var(--kraft)}
  .cfoot .ccontact{color:var(--ink);font-weight:700;font-size:.78rem;margin-bottom:6px}

  .backlink{background:transparent;border:none;color:var(--muted);font-family:"IBM Plex Mono";font-size:.8rem;padding:0;margin-bottom:14px}
  .backlink:hover{color:var(--amber)}
  .tabbar{display:flex;gap:6px;margin:14px 0 16px;background:var(--surface2);padding:5px;border-radius:9px;border:1px solid var(--line)}
  .tabbar button{flex:1;background:transparent;border:none;color:var(--muted);padding:9px;border-radius:6px;font-family:"IBM Plex Mono";font-size:.76rem;letter-spacing:.04em}
  .tabbar button.on{background:var(--amber);color:var(--ink);font-weight:600}
  .loadingbox{text-align:center;padding:30px;border:1px dashed var(--line);border-radius:10px}
  .spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--amber);border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:rgba(169,78,56,.16);border:1px solid var(--rust);border-radius:8px;padding:12px 14px;font-size:.88rem;margin-top:12px}
  .note{background:rgba(46,92,126,.14);border:1px solid var(--blueprint);border-radius:8px;padding:11px 14px;font-size:.84rem;margin-top:12px;color:var(--text)}
  .hint{font-family:"IBM Plex Mono";font-size:.72rem;color:var(--muted);margin-top:8px}
  /* Voice-first New Job */
  .vf-hero{text-align:center;padding:6px 0 4px}
  .vf-title{font-family:"Archivo",sans-serif;font-weight:900;font-size:1.9rem;line-height:1.1;margin:6px 0 4px}
  .vf-sub{color:var(--muted);font-size:.92rem;max-width:340px;margin:0 auto 16px}
  .vf-mic-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin:6px 0 14px}
  .vf-mic{width:104px;height:104px;border-radius:50%;border:none;background:var(--amber);box-shadow:0 8px 26px rgba(207,127,24,.45), inset 0 2px 0 rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent;transition:transform .08s ease}
  .vf-mic:active{transform:scale(.94)}
  .vf-mic.rec,.vf-mic.ptt.rec:active{background:var(--rust);box-shadow:0 8px 26px rgba(169,78,56,.5);animation:micpulse 1.1s ease-in-out infinite}
  @keyframes micpulse{0%,100%{box-shadow:0 8px 26px rgba(169,78,56,.5)}50%{box-shadow:0 8px 40px rgba(169,78,56,.85)}}
  @media(prefers-reduced-motion:reduce){.vf-mic.rec{animation:none}}
  .vf-mic.off{background:var(--surface2);border:1px dashed var(--line);font-size:2.2rem}
  .vf-mic-lbl{font-family:"IBM Plex Mono";font-size:.82rem;color:var(--text)}
  .vf-mic-lbl.warn{color:var(--rust);max-width:300px;text-align:center;font-size:.74rem}
  .vf-text{min-height:96px}
  .reread{float:right;background:none;border:1px solid var(--line);color:var(--amber);border-radius:6px;font-family:"IBM Plex Mono";font-size:.64rem;padding:2px 7px;cursor:pointer;margin-top:-2px}
  .intake{margin-top:12px}
  .intake-h{font-family:"IBM Plex Mono";font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;color:var(--amber);margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .intake-load{color:var(--muted);text-transform:none;letter-spacing:0}
  .intake-box{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--surface2)}
  .intake-row{display:flex;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line)}
  .intake-row:last-child{border-bottom:none}
  .intake-row .ik{flex:0 0 84px;color:var(--muted);font-family:"IBM Plex Mono";font-size:.66rem;text-transform:uppercase;letter-spacing:.04em;padding-top:2px}
  .intake-row .iv{flex:1;color:var(--text);font-size:.92rem}
  .qcard{background:rgba(238,155,46,.08);border:1px solid var(--amber-deep);border-radius:12px;padding:12px 14px}
  .qrow{font-size:.9rem;color:var(--text);padding:3px 0}
  .langchip{display:block;width:100%;margin-top:16px;background:var(--surface2);border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:10px 12px;font-family:"IBM Plex Mono";font-size:.72rem;cursor:pointer;text-align:center}
  /* Photo capture on New Job — one premium "Add Photos" action, icon echoes the mic. */
  .cap-photos{margin-top:16px}
  .addphotos{width:100%;display:flex;align-items:center;justify-content:center;gap:11px;background:var(--surface2);border:none;border-radius:16px;padding:16px;color:var(--text);font-family:inherit;font-weight:600;font-size:1.05rem;letter-spacing:-.01em;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .08s ease}
  .addphotos:active{transform:scale(.985)}
  .addphotos .ap-ic{width:36px;height:36px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;flex:0 0 auto;box-shadow:0 3px 10px rgba(207,127,24,.32)}
  .cap-photos .photogrid{margin-top:12px;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:10px}
  .cap-photos .thumb{aspect-ratio:1;border-radius:14px;border:none}
  .cap-photos .thumb .x{background:rgba(0,0,0,.5);border:none;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:#fff}
  /* Leads — money coming in, not a spreadsheet */
  .leadcard{display:flex;align-items:center;gap:13px;text-align:left;cursor:pointer;width:100%;font-family:inherit;-webkit-tap-highlight-color:transparent}
  .leadcard.hot{background:rgba(238,155,46,.1);border-color:var(--amber-deep)}
  .leadcard.hot .kpi-ic{background:var(--amber);color:var(--ink)}
  .leadcard.hot .kpi-v{color:var(--amber)}
  .leadcard .lead-go{margin-left:auto;color:var(--muted);flex:0 0 auto}
  .lead{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:11px;box-shadow:var(--shadow)}
  .lead-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .lead-who{font-weight:700;font-size:1.02rem;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lead-st{flex:0 0 auto;font-family:"IBM Plex Mono";font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:20px;border:1px solid var(--line);color:var(--muted)}
  .lead-st.st-new{background:rgba(238,155,46,.18);border-color:var(--amber-deep);color:var(--amber)}
  .lead-st.st-cont{background:rgba(46,92,126,.18);border-color:var(--blueprint);color:#9cc4e0}
  .lead-st.st-sched,.lead-st.st-sent{background:rgba(46,92,126,.14);color:#9cc4e0}
  .lead-st.st-won{background:rgba(62,125,90,.2);border-color:#3e7d5a;color:#8fd0a8}
  .lead-st.st-lost{background:rgba(169,78,56,.16);border-color:var(--rust);color:#e0a08f}
  .lead-meta{font-size:.9rem;color:var(--text);margin-top:5px}
  .lead-contact{font-family:"IBM Plex Mono";font-size:.78rem;color:var(--amber);margin-top:3px}
  .lead-msg{font-size:.88rem;color:var(--muted);margin-top:7px;line-height:1.4}
  .lead-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px}
  .lead-src{font-family:"IBM Plex Mono";font-size:.66rem;color:var(--muted)}
  .lead-status-sel{background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:6px 8px;font-family:"IBM Plex Mono";font-size:.72rem;max-width:170px}
  .lead-actions{display:flex;gap:8px;align-items:center;margin-top:11px}
  .lead-del{flex:0 0 auto;background:none;border:1px solid var(--line);color:var(--muted);border-radius:9px;padding:0 13px;height:40px;cursor:pointer}
  .webhook-box{background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-top:4px;overflow-x:auto}
  .webhook-box code{font-family:"IBM Plex Mono";font-size:.72rem;color:var(--amber);white-space:nowrap}
  .addline{margin-top:4px}
  .tplsel{width:100%;margin:10px 0 4px;background:var(--surface2);border:1px dashed var(--line);color:var(--text);border-radius:8px;padding:11px 12px;font-family:"IBM Plex Mono";font-size:.82rem}

  @media(max-width:520px){
    .row2{grid-template-columns:1fr}
  }

  .cap-tools{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
  .mic{display:inline-flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:12px 18px;font-family:"IBM Plex Mono";font-size:.84rem}
  .mic:hover{border-color:var(--amber);color:var(--amber)}
  /* Press-to-talk: a held button, not a tap toggle. Kill text selection, the
     tap highlight, and any touch-scroll so a hold stays a clean hold. */
  .mic.ptt{cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent;transition:transform .07s ease,background .15s,border-color .15s,color .15s}
  .mic.ptt:active{transform:scale(.97);border-color:var(--amber);color:var(--amber)}
  .mic.rec,.mic.ptt.rec:active{background:var(--rust);border-color:var(--rust);color:#fff}
  .mic .dot{width:9px;height:9px;border-radius:50%;background:currentColor}
  .mic.rec .dot{animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
  .mic-note{font-family:"IBM Plex Mono";font-size:.72rem;color:var(--muted)}
  .photogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;margin-top:2px}
  .thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
  .thumb.onbid{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber)}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .x{position:absolute;top:3px;right:3px;background:rgba(31,37,44,.82);color:#fff;border:none;border-radius:50%;width:23px;height:23px;font-size:.78rem;line-height:1;display:flex;align-items:center;justify-content:center}
  .thumb .pend{position:absolute;top:3px;left:3px;background:rgba(207,127,24,.9);color:#1F252C;font-family:"IBM Plex Mono";font-size:.55rem;padding:1px 5px;border-radius:3px}
  .thumb .bidtog{position:absolute;left:0;right:0;bottom:0;width:100%;border:none;background:rgba(31,37,44,.84);color:#e6e0d4;font-family:"IBM Plex Mono";font-size:.58rem;letter-spacing:.02em;padding:4px 2px;cursor:pointer;white-space:nowrap;overflow:hidden}
  .thumb .bidtog.on{background:rgba(207,127,24,.94);color:#1F252C;font-weight:700}
  .cgallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:6px}
  .cgallery img{width:100%;height:110px;object-fit:cover;border-radius:8px;border:1px solid var(--line);display:block}
  .addphoto{display:flex;flex-direction:column;gap:3px;align-items:center;justify-content:center;aspect-ratio:1;border:1px dashed var(--line);border-radius:8px;color:var(--muted);font-family:"IBM Plex Mono";font-size:.72rem;background:transparent}
  .addphoto:hover{border-color:var(--amber);color:var(--amber)}

  .consent{margin-top:14px;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:12px 14px}
  .consent label{display:flex;gap:10px;align-items:flex-start;font-size:.86rem;color:#cdc7bb;cursor:pointer}
  .consent input{margin-top:3px;width:17px;height:17px;accent-color:var(--amber);flex-shrink:0}
  .consent-fine{font-family:"IBM Plex Mono";font-size:.66rem;color:var(--muted);margin-top:8px;padding-left:27px}
  .legalbox{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:16px;margin-top:18px}
  .legalbox h3{font-family:"IBM Plex Mono";font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
  .legalbox p{font-size:.84rem;color:#cdc7bb;margin-bottom:8px}
  .legalbox .consent-fine{padding-left:0}

  /* auth */
  .auth{max-width:380px;margin:6vh auto 0;padding:0 4px}
  .auth h1{font-family:"Archivo";font-weight:900;font-size:1.8rem;letter-spacing:-.02em;margin:10px 0 4px}
  .auth-card{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:22px;margin-top:18px}
  .auth-switch{text-align:center;margin-top:16px;font-size:.86rem;color:var(--muted)}
  .auth-switch a{color:var(--amber);cursor:pointer}
  .brand-big{display:flex;align-items:center;gap:10px;justify-content:center;font-family:"Archivo";font-weight:800;font-size:1.3rem}
  .brand-big .mark{width:28px;height:28px;border-radius:5px;background:var(--amber);display:flex;align-items:center;justify-content:center}
  .tagline{text-align:center;color:var(--muted);font-size:.9rem;margin-top:8px}

  #printArea{display:none}
  /* Non-blocking toasts (replace alert/prompt for confirmations + soft errors). */
  #toasts{position:fixed;left:0;right:0;bottom:calc(env(safe-area-inset-bottom,0) + 76px);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;padding:0 14px}
  .toast{pointer-events:auto;max-width:440px;width:100%;background:#1F252C;color:#F3EEE3;border:1px solid rgba(243,238,227,.15);border-radius:11px;padding:13px 16px;font-size:.92rem;box-shadow:0 8px 30px rgba(0,0,0,.3);display:flex;gap:10px;align-items:center;animation:toastin .18s ease}
  .toast.ok{border-left:4px solid #4f9d69}
  .toast.warn{border-left:4px solid var(--amber)}
  .toast.bad{border-left:4px solid var(--rust)}
  @keyframes toastin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .flash{outline:2px solid var(--amber)!important;outline-offset:1px;border-radius:8px;transition:outline .2s}
  /* Bottom navigation (thumb zone). Center + is equidistant for either hand. */
  #view{padding-bottom:88px}
  /* Pin to the bottom but keep it inside the centered app column (matches .app
     max-width) so on desktop the bar doesn't stretch edge-to-edge. */
  .botnav{position:fixed;left:0;right:0;bottom:0;margin:0 auto;max-width:760px;z-index:900;display:flex;justify-content:space-around;align-items:flex-end;background:var(--surface2);border-top:1px solid rgba(243,238,227,.1);padding:6px 4px calc(6px + env(safe-area-inset-bottom,0))}
  .botnav .bn{flex:1;background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;font-family:inherit;font-size:.64rem;font-weight:600;min-height:54px;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .botnav .bn .bi{display:flex;align-items:center;justify-content:center;height:24px}
  .botnav .bn.on{color:var(--amber)}
  .botnav .bn-add{flex:0 0 auto;justify-content:flex-start;position:relative;touch-action:none;-webkit-user-select:none;user-select:none}
  .botnav .bn-add .fab{display:flex;align-items:center;justify-content:center;width:58px;height:58px;margin-top:-22px;border-radius:50%;
    background:radial-gradient(120% 120% at 32% 24%, #FFC264 0%, #EE9B2E 56%, #DC8918 100%);
    box-shadow:0 9px 22px rgba(207,127,24,.5), inset 0 1px 0 rgba(255,255,255,.4), inset 0 -2px 6px rgba(140,80,8,.25);
    transition:transform .14s ease, box-shadow .14s ease}
  .botnav .bn-add .fab svg{display:block;transform:translateY(.5px)}
  .botnav .bn-add .add-l{margin-top:4px;color:var(--amber);font-weight:700}
  .botnav .bn-add:active .fab{transform:scale(.91);box-shadow:0 4px 12px rgba(207,127,24,.5), inset 0 1px 0 rgba(255,255,255,.4)}
  .botnav .bn-add.pulse .fab{animation:fabpulse 2.2s ease-in-out infinite}
  @keyframes fabpulse{0%,100%{box-shadow:0 9px 22px rgba(207,127,24,.5), inset 0 1px 0 rgba(255,255,255,.4), 0 0 0 0 rgba(238,155,46,.55)}
    50%{box-shadow:0 9px 22px rgba(207,127,24,.5), inset 0 1px 0 rgba(255,255,255,.4), 0 0 0 11px rgba(238,155,46,0)}}
  @media(prefers-reduced-motion:reduce){.botnav .bn-add.pulse .fab{animation:none}}
  .sheet-wrap{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);display:flex;align-items:flex-end}
  .sheet{width:100%;background:var(--surface);border-top-left-radius:18px;border-top-right-radius:18px;padding:8px 12px calc(14px + env(safe-area-inset-bottom,0));animation:toastin .2s ease}
  .sheet-h{color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;padding:12px 8px 6px}
  .sheet-i{display:block;width:100%;text-align:left;background:none;border:none;color:var(--text);font-family:inherit;font-size:1.02rem;padding:16px 10px;border-radius:11px;cursor:pointer}
  .sheet-i:active{background:rgba(243,238,227,.08)}
  .sheet-i.danger{color:#e08a76}
  .appearance{margin:14px 0 4px}
  .seg{display:inline-flex;gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--surface2)}
  .seg .segbtn{background:transparent;border:none;color:var(--muted);padding:10px 18px;font-family:"IBM Plex Mono";font-size:.8rem;cursor:pointer;border-right:1px solid var(--line)}
  .seg .segbtn:last-child{border-right:none}
  .seg .segbtn.on{background:var(--amber);color:var(--ink);font-weight:700}
  .jcard-next{font-size:.8rem;font-weight:700;margin-top:5px;color:var(--amber)}
  .jcard-next.signed{color:#6fce93}
  .jcard-next.scheduled{color:#7fb0d6}
  .jcard-next.sent{color:var(--muted)}
  @media print{
    body{background:#fff}
    .app,.top,main{all:unset}
    body *{visibility:hidden}
    #printArea,#printArea *{visibility:visible}
    #printArea{display:block;position:absolute;left:0;top:0;width:100%}
    .client{border:none;border-radius:0}
  }
</style>
</head>

// × for desktop); dismissed ids are remembered so they don't come back.
function notifBanner(){
  const items=((NOTIFS&&NOTIFS.items)||[]).filter(i=>!NOTIF_DISMISSED.includes(i.id));
  if(!items.length) return '';
  const unread=items.filter(i=>i.unread).length;
  const row=(i)=>{
    const who=(i.customer||'').trim()||'Your client';

      ? `<span class="news-ic pay">${icon('revenue',15)}</span><b>${esc(who)}</b> paid a ${money(i.amount||0)} deposit`
      : `<span class="news-ic">${icon('check',15)}</span><b>${esc(who)}</b> accepted your proposal`;

    const nav=i.jobId?`if(this.closest('.news-row')._sw)return; go('job','${i.jobId}')`:'';
    return `<div class="news-row" ontouchstart="nTouch(event,this)" ontouchmove="nTouch(event,this)" ontouchend="nTouch(event,this,${i.id})" ontouchcancel="nTouch(event,this,${i.id})">
      <button class="news-item ${i.unread?'unread':''}" onclick="${nav}"><div class="news-t">${msg}</div><div class="news-s">${sub}</div></button>
      <button class="news-x" onclick="event.stopPropagation();dismissNotif(${i.id})" title="Dismiss" aria-label="Dismiss">✕</button>
    </div>`;
  };
  return `<div class="newsbanner"><div class="news-h">🎉 Good news${unread?` · <span class="news-count">${unread} new</span>`:''}</div>`
    + items.slice(0,4).map(row).join('') + `</div>`;
}
function dismissNotif(id){
  if(!NOTIF_DISMISSED.includes(id)) NOTIF_DISMISSED.push(id);
  if(NOTIF_DISMISSED.length>300) NOTIF_DISMISSED=NOTIF_DISMISSED.slice(-300);
  localStorage.setItem('bt_notif_dismissed', JSON.stringify(NOTIF_DISMISSED));
  render();
}
// Swipe-to-dismiss for a news row. One handler for start/move/end via event.type.
function nTouch(e, el, id){
  if(e.type==='touchstart'){ el._x0=e.touches[0].clientX; el._dx=0; el._sw=false; el.style.transition='none'; }
  else if(e.type==='touchmove'){
    if(el._x0==null) return;
    el._dx=e.touches[0].clientX-el._x0;
    if(Math.abs(el._dx)>6) el._sw=true;
    el.style.transform='translateX('+el._dx+'px)';
    el.style.opacity=String(Math.max(.15, 1-Math.abs(el._dx)/220));
  } else { // touchend / touchcancel
    el.style.transition='transform .2s ease, opacity .2s ease';
    if(Math.abs(el._dx||0)>80){
      el.style.transform='translateX('+(el._dx>0?500:-500)+'px)'; el.style.opacity='0';
      setTimeout(()=>dismissNotif(id),190);
    } else { el.style.transform=''; el.style.opacity=''; }
    el._x0=null;
    setTimeout(()=>{ el._sw=false; }, 60); // let the click handler see the swipe, then clear
  }
}

function persistAuth(){
  if(TOKEN) localStorage.setItem('bt_token', TOKEN); else localStorage.removeItem('bt_token');
  if(USER) localStorage.setItem('bt_user', JSON.stringify(USER)); else localStorage.removeItem('bt_user');
}

/* ============ API helper ============ */
async function api(path, opts={}){
  const headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if(TOKEN) headers['Authorization'] = 'Bearer '+TOKEN;
  const res = await fetch(API+path, Object.assign({}, opts, { headers }));
  let body=null; try{ body = await res.json(); }catch(e){}
  if(res.status===401){ // session gone — drop to auth, keep local data
    TOKEN=null; USER=null; persistAuth(); throw Object.assign(new Error((body&&body.error)||'Session expired'),{status:401});
  }
  if(!res.ok) throw Object.assign(new Error((body&&body.error)||('Error '+res.status)),{status:res.status, code:body&&body.code});
  return body;
}

    TOKEN=r.token; USER=r.user; persistAuth();
    if(r.user){ SETTINGS=Object.assign({}, SETTINGS, {
      company:r.user.company||SETTINGS.company, name:r.user.name||'', phone:r.user.phone||'',
      license:r.user.license||'', from:r.user.default_from_lang||'es', to:r.user.default_to_lang||'en',
      logo:(r.user.logo!==undefined?r.user.logo:SETTINGS.logo)||''

    render();
    await Promise.all([syncNow(true), loadBilling(), loadPayments(), loadMe(), loadNotifications(), loadCollected(), loadQuickbooks()]);
    render();
  }catch(e){ state.authError = e.message || 'Could not sign in.'; render(); }

/* ============ sync engine (offline-first, last-write-wins) ============ */
function setSync(s){ syncing=s; paintSync(); }
function paintSync(){
  const b=document.getElementById('syncBadge'); if(!b) return;
  const pending = JOBS.some(j=>j._dirty||j._deleted) || settingsDirty;
  b.classList.remove('online','offline','saving');
  let label;
  if(!online){ b.classList.add('offline'); label='Offline'; }
  else if(syncing){ b.classList.add('saving'); label='Syncing…'; }
  else if(pending){ b.classList.add('saving'); label='Pending'; }
  else { b.classList.add('online'); label='Synced'; }
  const l=b.querySelector('.lbl'); if(l) l.textContent=label;
  const banner=document.getElementById('offlineBanner'); if(banner) banner.style.display = online?'none':'block';
}

async function syncNow(force){
  if(!TOKEN || !online || syncing) { paintSync(); return; }
  setSync(true);
  try{
    // 1) push settings if changed
    if(settingsDirty){
      try{ await api('/api/me',{method:'PATCH', body:JSON.stringify({
        company:SETTINGS.company, name:SETTINGS.name, phone:SETTINGS.phone,
        license:SETTINGS.license, from:SETTINGS.from, to:SETTINGS.to, logo:SETTINGS.logo||'',
        tax_rate:Number(SETTINGS.tax_rate)||0, region:SETTINGS.region||'' })}); settingsDirty=false; }catch(e){}
    }
    // 2) pull server jobs
    let server=[];
    try{ server = (await api('/api/jobs')).jobs || []; }catch(e){ server=[]; }
    const serverById = new Map(server.map(j=>[j.id,j]));

    // 3) reconcile each local job
    for(const local of JOBS.slice()){
      if(local._deleted){
        try{ await api('/api/jobs/'+local.id,{method:'DELETE'}); }catch(e){ if(e.status!==404) continue; }
        JOBS = JOBS.filter(j=>j!==local); continue;
      }
      if(local._dirty){
        const payload = jobPayload(local);
        try{
          if(serverById.has(local.id)) await api('/api/jobs/'+local.id,{method:'PATCH', body:JSON.stringify(payload)});
          else await api('/api/jobs',{method:'POST', body:JSON.stringify(payload)});
          await uploadPendingPhotos(local);
          local._dirty=false;
        }catch(e){ /* leave dirty; retry next sync */ }
      } else if(serverById.has(local.id)){
        const s=serverById.get(local.id);
        if((s.updated_at||0) > (local.updated_at||0)) replaceJob(local.id, hydrate(s));
      }
    }
    // 4) add server jobs we don't have locally
    for(const s of server){
      if(!JOBS.find(j=>j.id===s.id)) JOBS.push(hydrate(s));
    }
    JOBS.sort((a,b)=>(b.updated_at||b.created||0)-(a.updated_at||a.created||0));
    persist();
  } finally {
    setSync(false);
    // Never re-render out from under someone who's typing/dictating — that wiped
    // focus (and felt like lost work). The sync badge updates on its own.
    const ae=document.activeElement;
    const editing = recording || (ae && /^(TEXTAREA|INPUT|SELECT)$/.test(ae.tagName));
    if(state.booted && !editing) render();
  }
}

function jobPayload(j){
  return { id:j.id, title:j.title, from:j.from, to:j.to, transcript:j.transcript, translation:j.translation,
    summary:j.summary, brief:j.brief||null, assumptions:j.assumptions, exclusions:j.exclusions, lines:j.lines, upgrades:j.upgrades,
    notes:j.notes, margin:j.margin, status:j.status, scheduled_date:j.scheduled_date||'', scheduled_time:j.scheduled_time||'', address:j.address||'', customer:j.customer||'', deposit_pct:(j.deposit_pct==null?25:j.deposit_pct), tax_rate:(j.tax_rate==null?null:j.tax_rate), updated_at:j.updated_at, created_at:j.created };
}
function hydrate(s){
  return { id:s.id, title:s.title, created:s.created_at, updated_at:s.updated_at, from:s.from, to:s.to,
    transcript:s.transcript||'', translation:s.translation||'', summary:s.summary||'', brief:s.brief||null,
    assumptions:s.assumptions||[], exclusions:s.exclusions||[], lines:s.lines||[], upgrades:s.upgrades||[],
    notes:s.notes||'', margin:s.margin||0, status:s.status||'draft', scheduled_date:s.scheduled_date||'', scheduled_time:s.scheduled_time||'', address:s.address||'', customer:s.customer||'', deposit_pct:(s.deposit_pct==null?25:s.deposit_pct), tax_rate:(s.tax_rate==null?null:s.tax_rate),
    photos:(s.photos||[]).map(p=>({id:p.id, url:p.url, showOnBid:!!p.showOnBid})), _dirty:false };
}
function replaceJob(id, fresh){
  const i=JOBS.findIndex(j=>j.id===id);
  // keep any locally-pending photos that haven't uploaded yet
  if(i>=0){ const pend=(JOBS[i].photos||[]).filter(p=>p._pending); fresh.photos=(fresh.photos||[]).concat(pend); JOBS[i]=fresh; }
}

async function uploadPendingPhotos(job){
  const pend=(job.photos||[]).filter(p=>p._pending);
  for(const p of pend){
    try{
      const r=await api('/api/jobs/'+job.id+'/photos',{method:'POST', body:JSON.stringify({dataUrl:p.dataUrl, showOnBid:!!p.showOnBid})});
      p.id=r.photo.id; p.url=r.photo.url; p.showOnBid=!!r.photo.showOnBid; delete p.dataUrl; delete p._pending;
    }catch(e){ /* retry next sync */ }
  }
}

// Wire tap vs long-press on the static FAB once. Long-press (450ms) opens the menu;
// a quick tap runs the voice path. Keyboard users get the tap action via Enter/Space.
function attachFab(){
  const b=document.getElementById('bnAdd'); if(!b || b._wired) return; b._wired=true;
  let timer=null, longFired=false;
  b.addEventListener('pointerdown', ()=>{ longFired=false; timer=setTimeout(()=>{ longFired=true; if(navigator.vibrate){ try{ navigator.vibrate(12); }catch(_){} } openCreate(); }, 450); });
  b.addEventListener('pointerup', (e)=>{ if(timer){ clearTimeout(timer); timer=null; } if(!longFired) fabTap(); e.preventDefault(); });
  const cancel=()=>{ if(timer){ clearTimeout(timer); timer=null; } };
  b.addEventListener('pointerleave', cancel); b.addEventListener('pointercancel', cancel);
  b.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); fabTap(); } });
}

// Pull the full job (the list endpoint omits photo URLs). Refreshes signed photo
// links + server fields when the local copy isn't dirty. Fire-and-forget.
async function refreshJob(id){
  if(!online || !TOKEN) return;
  let r; try{ r = await api('/api/jobs/'+id); }catch(e){ return; }
  const s = r.job; const local = JOBS.find(j=>j.id===id); if(!local || !s) return;
  const pend = (local.photos||[]).filter(p=>p._pending);
  const serverPhotos = (s.photos||[]).map(p=>({id:p.id, url:p.url, showOnBid:!!p.showOnBid}));
  if(!local._dirty && (s.updated_at||0) >= (local.updated_at||0)){
    Object.assign(local, hydrate(s));
  }
  local.photos = serverPhotos.concat(pend);
  persist();
  if(state.view==='job' && state.jobId===id) render();
}

function render(){
  // Snapshot the live AI-Notepad text + caret BEFORE we replace the DOM, so a
  // background re-render (sync finishing, loadMe, etc.) can never wipe what's being
  // typed or dictated, and the cursor doesn't jump.
  let capFocused=false, capCaret=null;
  const liveCap=document.getElementById('capText');
  if(liveCap){ CAP_DRAFT.text=liveCap.value; try{ localStorage.setItem('bt_capdraft', JSON.stringify(CAP_DRAFT)); }catch(e){} capFocused=(document.activeElement===liveCap); try{ capCaret=liveCap.selectionStart; }catch(e){} }
  const authed = !!TOKEN;
  document.getElementById('topbar').style.display = authed ? 'block' : 'none';
  document.getElementById('botnav').style.display = authed ? 'flex' : 'none';
  const v = document.getElementById('view');
  if(!authed){ v.innerHTML = viewAuth(); paintSync(); return; }
  // Highlight the active bottom-nav item.
  const setOn=(id,on)=>{ const e=document.getElementById(id); if(e) e.classList.toggle('on',on); };
  setOn('bnHome', state.view==='home'||state.view==='capture');
  setOn('bnJobs', state.view==='job');
  setOn('bnSched', state.view==='schedule');
  setOn('bnMore', state.view==='settings'||state.view==='admin'||state.view==='catalog'||state.view==='leads');
  // Draw the eye to the money button when there's nothing to do yet (first bid).
  const fab=document.getElementById('bnAdd'); if(fab) fab.classList.toggle('pulse', JOBS.filter(j=>!j._deleted).length===0 && state.view==='home');
  paintBell();
  if(state.view==='home'){ v.innerHTML = viewHome(); markNotifsSeen(); }
  else if(state.view==='schedule') v.innerHTML = viewSchedule();
  else if(state.view==='capture') v.innerHTML = viewCapture();
  else if(state.view==='job') v.innerHTML = viewJob();
  else if(state.view==='settings') v.innerHTML = viewSettings();
  else if(state.view==='catalog') { v.innerHTML = viewCatalog(); if(!CATALOG.loaded) loadSkus(); }
  else if(state.view==='leads') { v.innerHTML = viewLeads(); if(!LEADS.loaded) loadLeads(); }
  else if(state.view==='admin') { v.innerHTML = viewAdmin(); loadAdmin(); }
  else if(state.view==='paywall') v.innerHTML = viewPaywall();
  // If we were typing in the notepad, restore focus + caret so a re-render is invisible.
  if(capFocused){ const t=document.getElementById('capText'); if(t){ try{ t.focus(); const p=(capCaret==null?t.value.length:Math.min(capCaret,t.value.length)); t.setSelectionRange(p,p); t.style.height='auto'; t.style.height=Math.min(t.scrollHeight,300)+'px'; }catch(e){} } }
  paintSync();
  paintTrialChip();
}

function greetingWord(){ const h=new Date().getHours(); return h<12?'Good morning':(h<18?'Good afternoon':'Good evening'); }
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function timeAgo(ts){ if(!ts) return ''; const m=Math.floor((Date.now()-ts)/60000); if(m<1)return'just now'; if(m<60)return m+'m ago'; const h=Math.floor(m/60); if(h<24)return h+'h ago'; return Math.floor(h/24)+'d ago'; }

// KPI math straight from the jobs we already store. "Won" = signed + scheduled.
function dashKPIs(visible){
  const sum=(arr)=>arr.reduce((s,j)=>s+bidPrice(j),0);
  const won=visible.filter(j=>jobStatus(j)==='signed'||jobStatus(j)==='scheduled');
  const sent=visible.filter(j=>jobStatus(j)==='sent');
  const now=Date.now();
  const followups=sent.filter(j=>now-(j.sent_at||j.updated_at||now) > 3*86400000);
  const decided=won.length+sent.length;
  return { collected:(COLLECTED&&COLLECTED.total)||0, payments:(COLLECTED&&COLLECTED.count)||0,
    wonValue:sum(won), wonCount:won.length, pending:sum(sent), pendingCount:sent.length,
    close: decided?Math.round(won.length/decided*100):0, followups:followups.length };
}
// "New leads" — a full-width dashboard card that should feel like money coming in.
function leadCard(){
  const n=LEADS_NEW||0;
  return `<button class="kpi leadcard${n>0?' hot':''}" style="grid-column:1/-1" onclick="go('leads')">
    <div class="kpi-ic">${icon('activity',18)}</div>
    <div class="kpi-txt"><div class="kpi-l">New leads</div><div class="kpi-v">${n}</div>
      <div class="kpi-s">${n>0?'from ads, website &amp; social · ready to bid':'connect your forms, ads &amp; social'}</div></div>
    <span class="lead-go">${icon('chevron',16)}</span>
  </button>`;
}
function kpiStrip(k){
  const card=(name,label,val,sub,cls)=>`<div class="kpi ${cls||''}"><div class="kpi-ic">${icon(name,18)}</div><div class="kpi-txt"><div class="kpi-l">${label}</div><div class="kpi-v">${val}</div><div class="kpi-s">${sub||''}</div></div></div>`;
  return `<div class="kpis">
    <div class="kpi hero rev">
      <div class="kpi-ic">${icon('revenue',22)}</div>
      <div class="kpi-txt"><div class="kpi-l">Revenue collected</div><div class="kpi-v">${money(k.collected)}</div>
        <div class="kpi-s">${k.payments?(k.payments+' payment'+(k.payments===1?'':'s')+' received'):'No payments yet'}</div></div>
    </div>
    <div class="kpi-grid">
      ${leadCard()}
      ${card('won','Won',money(k.wonValue),k.wonCount+' job'+(k.wonCount===1?'':'s'),'won')}
      ${card('pending','Pending',money(k.pending),k.pendingCount+' out for bid','pend')}
      ${card('close','Close rate',k.close+'%','of decided bids','close')}
      ${card('bell','Follow-ups',k.followups,k.followups?'need attention':'all clear',k.followups?'foll alert':'foll')}
    </div>
  </div>`;
}
function scheduleBlock(visible){
  const today=todayISO();
  const sched=visible.filter(j=>jobStatus(j)==='scheduled' && j.scheduled_date);
  const todays=sched.filter(j=>j.scheduled_date===today).sort(byTime);
  const upcoming=sched.filter(j=>j.scheduled_date>today).sort((a,b)=>a.scheduled_date.localeCompare(b.scheduled_date)).slice(0,3);
  const show=todays.length?todays:upcoming;
  const heading=todays.length?"Today's schedule":(upcoming.length?'Up next':'Schedule');
  const rows = show.length ? show.map(j=>{
    const loc=jobLocation(j); const m=loc?mapsLinks(loc):null; const ea=(j.address||'').trim();
    return `<div class="sch-item"><button class="sch-main" onclick="go('job','${j.id}')">
      <div class="sch-t">${esc(j.title)||'Untitled'}</div>
      <div class="sch-s">${j.scheduled_time?`<b style="color:var(--amber)">${fmtTime(j.scheduled_time)}</b> · `:''}${todays.length?'':fmtDate(j.scheduled_date)+' · '}${ea?esc(ea):(loc?money(bidPrice(j)):'No address')}</div>
      </button>${m?`<a class="sch-dir" href="${m.dir}" target="_blank" rel="noopener" title="Directions">${icon('nav',17)}</a>`:''}<a class="sch-dir" href="${calLink(j)}" target="_blank" rel="noopener" title="Add to Calendar">${icon('calendar',17)}</a></div>`;
  }).join('') : `<div class="hint" style="padding:6px 2px">Nothing scheduled. Mark a job “Scheduled” and pick a date.</div>`;
  return `<div class="panel"><button class="panel-h" onclick="go('schedule')"><span class="panel-title">${icon('calendar',15)} ${heading}</span><span class="panel-link">Weekly ${icon('chevron',13)}</span></button>${rows}</div>`;
}
function activityBlock(visible){
  const recent=[...visible].sort((a,b)=>(b.updated_at||0)-(a.updated_at||0)).slice(0,5);
  if(!recent.length) return '';
  const lbl=(j)=>{const s=jobStatus(j);return s==='signed'?'Signed — won':s==='scheduled'?'Scheduled':s==='sent'?'Bid sent':'Draft updated';};
  return `<div class="panel"><div class="panel-h static"><span class="panel-title">${icon('activity',15)} Recent activity</span></div>`
    + recent.map(j=>`<button class="act-item" onclick="go('job','${j.id}')"><div class="act-t">${esc(j.title)||'Untitled'}</div><div class="act-s">${lbl(j)} · ${timeAgo(j.updated_at)}</div></button>`).join('')
    + `</div>`;
}

// Weekly calendar — the Schedule view. Standalone (a Google Calendar sync would
// need OAuth and is on the roadmap).
function viewSchedule(){
  const visible = JOBS.filter(j=>!j._deleted && jobStatus(j)==='scheduled' && j.scheduled_date);
  const base=new Date(); base.setHours(0,0,0,0);
  const iso=(d)=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const todayK=iso(base);
  const byDate={}; visible.forEach(j=>{ (byDate[j.scheduled_date]=byDate[j.scheduled_date]||[]).push(j); });
  const days=[]; for(let i=0;i<7;i++){ const d=new Date(base); d.setDate(base.getDate()+i); days.push(d); }
  const item=(j)=>{ const loc=jobLocation(j); const m=loc?mapsLinks(loc):null; const ea=(j.address||'').trim();
    return `<div class="sch-item"><button class="sch-main" onclick="go('job','${j.id}')">
      <div class="sch-t">${esc(j.title)||'Untitled'}</div>
      <div class="sch-s">${j.scheduled_time?`<b style="color:var(--amber)">${fmtTime(j.scheduled_time)}</b> · `:''}${ea?esc(ea)+' · ':''}${money(bidPrice(j))}</div></button>
      ${m?`<a class="sch-dir" href="${m.dir}" target="_blank" rel="noopener" title="Directions">🧭</a>`:''}<a class="sch-dir" href="${calLink(j)}" target="_blank" rel="noopener" title="Add to Calendar">📲</a></div>`; };
  const dayBlocks=days.map(d=>{
    const k=iso(d); const jobs=(byDate[k]||[]).sort(byTime);
    const lbl=d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    return `<div class="wk-day ${k===todayK?'today':''}"><div class="wk-h">${k===todayK?'Today · ':''}${lbl}${jobs.length?` · ${jobs.length} ${jobs.length===1?'job':'jobs'}${jobs.length>1?' ⚠️':''}`:''}</div>${jobs.length?jobs.map(item).join(''):'<div class="wk-empty">—</div>'}</div>`;
  }).join('');
  const later=visible.filter(j=>j.scheduled_date>iso(days[6])).sort((a,b)=>a.scheduled_date.localeCompare(b.scheduled_date));
  const laterBlock=later.length?`<div class="wk-day"><div class="wk-h">Later</div>${later.map(item).join('')}</div>`:'';
  return `<div class="h-eyebrow">Schedule</div><h1 class="page">This week</h1>
    <div class="sub">Your scheduled jobs &amp; estimates — tap 🧭 for directions.</div>
    <div class="weekgrid">${dayBlocks}${laterBlock}</div>`;
}
function setJobFilter(f){ state.jobFilter=f; render(); }
function setJobStatus(id,s){
  const j=JOBS.find(x=>x.id===id); if(!j) return;
  j.status=s; if(s!=='draft' && !j.sent_at) j.sent_at=Date.now();
  touch(j); saveJobs(); render();
}
function setSchedule(id,v){
  const j=JOBS.find(x=>x.id===id); if(!j) return;
  j.scheduled_date=v||''; touch(j); saveJobs(); render();
}
function setScheduleTime(id,v){ const j=JOBS.find(x=>x.id===id); if(!j) return; j.scheduled_time=v||''; touch(j); saveJobs(); render(); }
function fmtTime(t){ if(!t) return ''; const p=String(t).split(':'); if(p.length<2) return t; let h=+p[0]; const ap=h<12?'AM':'PM'; h=h%12||12; return h+':'+p[1]+' '+ap; }
const byTime=(a,b)=>String(a.scheduled_time||'99:99').localeCompare(String(b.scheduled_time||'99:99'));
// Double-booking guard: other scheduled jobs that share this job's date.
function jobsOnDate(date, excludeId){
  if(!date) return [];
  return JOBS.filter(x=>!x._deleted && x.id!==excludeId && jobStatus(x)==='scheduled' && x.scheduled_date===date);
}
function conflictNote(j){
  const others=jobsOnDate(j.scheduled_date, j.id);
  if(!others.length) return '';
  return `<div class="schedwarn">⚠️ Heads up — ${others.length} other ${others.length===1?'job':'jobs'} already on ${fmtDate(j.scheduled_date)}: ${others.map(o=>(o.scheduled_time?fmtTime(o.scheduled_time)+' ':'')+(esc(o.title)||'Untitled')).join(' · ')}</div>`;
}
function fmtDate(d){
  if(!d) return ''; const p=String(d).split('-'); if(p.length!==3) return d;
  return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
// Google Maps deep-links built from a plain address string — no API key, no cost.
function mapsLinks(addr){
  const q=encodeURIComponent((addr||'').trim());
  return {
    map:`https://www.google.com/maps/search/?api=1&query=${q}`,
    dir:`https://www.google.com/maps/dir/?api=1&destination=${q}`,
    sv:`https://www.google.com/maps?q=${q}&layer=c`
  };
}
function setAddress(id,v){ const j=JOBS.find(x=>x.id===id); if(!j) return; j.address=v||''; touch(j); saveJobs(); refreshAddrBlock(); }
// Refresh ONLY the address block (map links + note) — not the whole page — so the
// page doesn't jump or steal focus while you're typing the name/address.
function refreshAddrBlock(){ const j=currentJob(); const el=document.getElementById('addrWrap'); if(j&&el) el.innerHTML=addrBlock(j); }
function setCustomer(id,v){ const j=JOBS.find(x=>x.id===id); if(!j) return; j.customer=v||''; touch(j); saveJobs(); }
// One source of truth for a job's location: the explicit address field, or — so
// you never type it twice — the project name itself when that looks like an
// address (has a number). Drives every map, directions & calendar link.
function looksLikeAddress(t){ t=(t||'').trim(); return /\d/.test(t) && t.length>4; }
function jobLocation(j){ const a=(j&&j.address||'').trim(); if(a) return a; const t=(j&&j.title||'').trim(); return looksLikeAddress(t)?t:''; }
// "Add to Calendar" — opens a pre-filled Google Calendar event (all-day on the
// scheduled date). One tap → it's on the contractor's REAL calendar, with
// reminders. No API key, no OAuth (same spirit as the maps deep-links).
function calLink(j){
  if(!j || !j.scheduled_date) return '';
  const p=j.scheduled_date.split('-'); if(p.length!==3) return '';
  const pad=(n)=>String(n).padStart(2,'0');
  let dates;
  if(j.scheduled_time && /^\d{1,2}:\d{2}$/.test(j.scheduled_time)){
    const [hh,mm]=j.scheduled_time.split(':').map(Number);
    const s=new Date(+p[0],+p[1]-1,+p[2],hh,mm), e=new Date(s.getTime()+2*3600000);
    const f=(d)=>d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(d.getHours())+pad(d.getMinutes())+'00';
    dates=f(s)+'/'+f(e);
  } else {
    const d=new Date(+p[0],+p[1]-1,+p[2]); d.setDate(d.getDate()+1);
    dates=p[0]+p[1]+p[2]+'/'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());
  }
  const note=(j.notes||'').trim();
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+encodeURIComponent((j.title||'Job')+' — '+(SETTINGS.company||'Bidtranslator'))
    +'&dates='+dates
    +(jobLocation(j)?'&location='+encodeURIComponent(jobLocation(j)):'')
    +'&details='+encodeURIComponent('Scheduled via Bidtranslator · '+money(bidPrice(j))+(note?'\n\nNotes: '+note:''));
}
function setTitle(id,v){ const j=JOBS.find(x=>x.id===id); if(!j) return; j.title=v||''; touch(j); saveJobs(); refreshAddrBlock(); }
let REVEAL_ADDR=null; // jobId for which the user chose to add a separate address
function revealAddr(id){ REVEAL_ADDR=id; refreshAddrBlock(); const el=document.querySelector('#addrWrap .addrinput'); if(el) el.focus(); }
function addrBlock(j){
  const sep=(j.address||'').trim();   // explicit, separate address
  const loc=jobLocation(j);           // the address actually used everywhere
  const links = loc ? (()=>{ const m=mapsLinks(loc); return `<div class="addrlinks">`
    +`<a class="maplink" href="${m.map}" target="_blank" rel="noopener">📍 Map</a>`
    +`<a class="maplink" href="${m.dir}" target="_blank" rel="noopener">🧭 Directions</a>`
    +`<a class="maplink" href="${m.sv}" target="_blank" rel="noopener">👁 Street View</a></div>`; })() : '';
  // Project name IS the address (and no separate one): show it resolved — one field,
  // no second empty box — with a link to add a different address only if needed.
  if(!sep && loc && REVEAL_ADDR!==j.id){
    return `<div class="addrrow"><label class="fld">Address</label>
      <div class="addrresolved">📍 ${esc(loc)} <span class="addrok">· from project name</span></div>
      ${links}
      <button type="button" class="linklike" onclick="revealAddr('${j.id}')">Use a different address</button></div>`;
  }
  // Otherwise show the input (explicit address set, none yet, or "use different").
  const input=`<input class="addrinput" value="${escAttr(sep)}" onchange="setAddress('${j.id}',this.value)" placeholder="📍 Job address — for maps & directions"/>`;
  const note = !loc ? `<div class="hint" style="margin-top:4px">Add an address for one-tap maps, directions &amp; calendar — or just put the address in the project name above and it carries over here.</div>` : '';
  return `<div class="addrrow"><label class="fld">Address</label>${input}${note}${links}</div>`;
}
// Daily-route card (used in the Scheduled tab): job + its address + one-tap directions.
function routeCardHTML(j){
  const m=jobLocation(j)?mapsLinks(jobLocation(j)):null;
  return `<div class="routecard">
    <button class="routemain" onclick="go('job','${j.id}')">
      <div class="jt">${esc(j.title)||'Untitled job'}</div>
      <div class="jm">${j.scheduled_date?`📅 ${fmtDate(j.scheduled_date)} · `:''}${j.address?esc(j.address):'<span style="color:var(--muted)">No address yet</span>'}</div>
    </button>
    ${m?`<a class="btn blue sm routedir" href="${m.dir}" target="_blank" rel="noopener">🧭</a>`:''}
  </div>`;
}

function adminHTML(d, users){
  const o=d.overview||{}, f=d.funnel||[], drop=d.biggestDropoff, feats=d.features||[];
  const k=(label,val,sub)=>`<div class="kpi"><div class="kpi-l">${label}</div><div class="kpi-v">${val}</div><div class="kpi-s">${sub||''}</div></div>`;
