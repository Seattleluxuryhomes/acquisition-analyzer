    + k('Contractors', o.contractors, `+${o.newToday||0} today`)
    + k('Active 7d', o.active7d, `${o.activeToday||0} today`)
    + k('Onboarded', o.onboarded, 'completed')
    + k('Bids created', o.bidsCreated, `${o.bidsSent||0} sent`)
    + k('Accepted', o.bidsAccepted, 'won')
    + k('Deposits paid', o.depositsPaid, money(o.depositsPaidValue||0))
    + k('Pipeline won', money(o.pipelineWonValue||0), 'signed+sched')
    + k('Active subs', o.activeSubscriptions, 'paying')
    + `</div>`;
  const maxF = f.length ? (f[0].count||1) : 1;
  const funnelHTML = `<div class="panel"><div class="panel-h static"><span>📉 Contractor funnel</span>${drop&&drop.dropoffFromPrev?`<span class="panel-link" style="color:#ff9b7a">drop: ${esc(drop.from)}→${esc(drop.to)} ${drop.dropoffFromPrev}%</span>`:''}</div>`
    + f.map(s=>`<div class="frow"><div class="fbar" style="width:${Math.max(4,Math.round((s.count/maxF)*100))}%"></div><div class="flabel">${esc(s.stage)}</div><div class="fval">${s.count}${s.dropoffFromPrev?` <span class="fdrop">▼${s.dropoffFromPrev}%</span>`:''}</div></div>`).join('')
    + `</div>`;
  const usersHTML = `<div class="panel"><div class="panel-h static"><span>👥 Contractors (${users.length})</span></div>`
    + (users.length?users.map(u=>`<div class="act-item"><div class="act-t">${esc(u.company)||esc(u.email)}${u.subscription_status&&u.subscription_status!=='none'?`<span class="subpill">${esc(u.subscription_status)}</span>`:''}</div><div class="act-s">${esc(u.email)} · leads ${u.leads} · bids ${u.bids} · accepted ${u.accepted} · collected ${money(u.revenueCollected)} · won ${money(u.pipelineWonValue)}${u.last_login?' · seen '+timeAgo(u.last_login):' · never logged in'}</div></div>`).join(''):'<div class="hint" style="padding:8px">No contractors yet.</div>')

  return kpis + funnelHTML + usersHTML + featHTML;

  }

  const micBlock = !window.isSecureContext
    ? `<div class="vf-mic off">🎤</div><div class="vf-mic-lbl warn">Voice needs a secure (https) connection — your SSL isn't active yet. Type below for now.</div>`

  if(!x){ return intakeRunning ? `<div class="intake">${head}<div class="hint" style="padding:6px 2px">Listening for the details…</div></div>` : ''; }

  const list=(label,arr)=> (Array.isArray(arr)&&arr.length)?`<div class="intake-row"><span class="ik">${label}</span><span class="iv">${arr.map(s=>esc(String(s))).join(' · ')}</span></div>`:'';
  const body = row('Client', x.client)+row('Address', x.address)+list('Scope', x.scope)+list('Materials', x.materials)+list('Labor', x.labor)+row('Timeline', x.timeline);

// Auto project name from client + work (or address, or scope) — no manual entry.
function autoProjectName(){
  const x=CAP_INTAKE||{};
  if((x.project_name||'').trim()) return x.project_name.trim().slice(0,80);
  const client=(x.client||'').trim();
  const scope0=((x.scope&&x.scope[0])||'').trim();
  const addr=(x.address||'').trim();
  if(client) return (scope0?client+' — '+scope0:client).slice(0,80);
  if(addr) return addr.slice(0,80);
  if(scope0) return scope0.slice(0,80);
  return defaultJobTitle();
}

let intakeTimer=null, intakeRunning=false, intakeLastAt=0, intakeLastLen=0;
function renderIntakeRegions(){

}
function scheduleIntake(){
  if(!AI_BUILD || !online || !TOKEN) return;
  clearTimeout(intakeTimer);
  intakeTimer=setTimeout(()=>runIntake(false), 1300);
}
async function runIntake(force){
  if(!AI_BUILD || !online || !TOKEN) return;
  const ta=document.getElementById('capText');
  const t=((ta?ta.value:CAP_DRAFT.text)||'').trim();
  if(t.length<12){ return; }
  if(!force && t.length-intakeLastLen < 12 && (Date.now()-intakeLastAt) < 7000) return; // coalesce
  intakeRunning=true; renderIntakeRegions();
  try{
    const r=await api('/api/assist/intake',{method:'POST', body:JSON.stringify({ text:t })});
    if(r && r.intake){ CAP_INTAKE=r.intake; persistIntake(); intakeLastAt=Date.now(); intakeLastLen=t.length; }
  }catch(e){ /* keep going; this is a live helper, never block the user */ }
  intakeRunning=false;
  if(state.view==='capture') renderIntakeRegions();
}
function langOpts(sel){ return Object.entries(LANGS).map(([k,v])=>`<option value="${k}" ${k===sel?'selected':''}>${v}</option>`).join(''); }

// Run the AI on an existing job's captured text and fill in lines/rooms/totals.
async function rebuildWithAI(id, btn){
  const j=JOBS.find(x=>x.id===id); if(!j) return;
  if(!entitled()){ go('paywall'); return; }
  const text=String(j.transcript||'').trim();
  if(!text){ alert('Add the captured conversation in the box above first.'); return; }
  if(!online){ alert('The AI build needs an internet connection.'); return; }
  if((j.lines||[]).some(l=>l.desc||l.price||l.hours||l.rate)
     && !confirm('This replaces the current line items with a fresh AI draft. Continue?')){ return; }
  const orig = btn ? btn.textContent : '';
  if(btn){ btn.disabled=true; btn.textContent='Building…'; }
  try{
    const data = await api('/api/assist/build',{ method:'POST', body:JSON.stringify({ text, from_lang:j.from, to_lang:j.to }) });
    j.translation = data.translation || j.translation || '';
    j.summary = data.summary || '';
    j.brief = data.brief || null;
    j.lines = (Array.isArray(data.lines)?data.lines:[]).slice(0,12).map(l=>({
      id:uid(), section:String(l.section||'').slice(0,80), desc:String(l.desc||'').slice(0,120),
      type:(['hourly','unit'].includes(l.type)?l.type:'fixed'),
      price:+l.price||0, hours:+l.hours||0, rate:+l.rate||0, qty:+l.qty||0, unit:String(l.unit||'').slice(0,16), furn:'you'
    }));
    j.upgrades = (Array.isArray(data.upgrades)?data.upgrades:[]).slice(0,4).map(u=>({id:uid(),desc:String(u.desc||''),price:+u.price||0}));
    j.assumptions = (Array.isArray(data.assumptions)?data.assumptions:[]).map(String);
    j.exclusions = (Array.isArray(data.exclusions)?data.exclusions:[]).map(String);
    touch(j); saveJobs();
    state.bidTab='build'; render(); window.scrollTo(0,0);
  }catch(e){
    if(e.status===402){ gate402(e); return; }
    if(btn){ btn.disabled=false; btn.textContent=orig||'🪄 Build the bid from this text'; }
    alert(e.code==='AI_UNCONFIGURED'
      ? 'The AI build isn’t switched on yet — add your ANTHROPIC_API_KEY in the app settings to enable it.'
      : ('Could not build the draft: '+(e.message||'error')));
  }
}

async function buildFromConversation(){
  if(!entitled()){ go('paywall'); return; }
  const f=newJobFromForm();
  if(!f.text){ state.error='Add the conversation first, or choose “build manually”.'; render(); return; }
  if(!online){ state.error='You’re offline — the AI build needs a connection. Your job will be created so you can fill it in by hand now and build later.'; const job=makeLocalJob(f,null); JOBS.unshift(job); saveJobs(); state.bidTab='notebook'; go('job',job.id); return; }
  state.loading=true; state.error=''; render();
  let data=null;
  try{
    data = await api('/api/assist/build',{ method:'POST', body:JSON.stringify({ text:f.text, from_lang:f.from, to_lang:f.to }) });
  }catch(e){
    if(e.status===402){ state.loading=false; gate402(e); return; }
    data=null;
    state.error = e.code==='AI_UNCONFIGURED'
      ? 'The AI build isn’t set up on the server yet — your job was created, fill it in by hand.'
      : 'Could not build the draft ('+(e.message||'error')+'). Your job was created — you can fill it in by hand.';
  }
  const job=makeLocalJob(f, data);
  JOBS.unshift(job); clearCapDraft(); saveJobs();
  state.loading=false; state.bidTab='notebook'; go('job',job.id);
}

function lineAmt(l){ return l.type==='unit' ? (+l.qty||0)*(+l.rate||0) : l.type==='hourly' ? (+l.hours||0)*(+l.rate||0) : (+l.price||0); }
const UNITS=['sq ft','ln ft','sq yd','cu yd','each','ton','gal','hr'];
function unitOpts(sel){ sel=sel||'sq ft'; return UNITS.map(u=>`<option ${u===sel?'selected':''}>${u}</option>`).join(''); }
// bidTotal = the contractor's COST (sum of line items). bidPrice = what the client
// pays, the cost run through the true margin. Mirror of server src/proposal.js.
function bidTotal(j){ return (j.lines||[]).filter(l=>l.furn!=='client').reduce((s,l)=>s+lineAmt(l),0); }
function marginFactor(m){ m=+m||0; return (m>0&&m<100)?1/(1-m/100):1; }
function pricedAmt(amt,m){ return Math.round((+amt||0)*marginFactor(m)); }
// Sum the priced lines (not the scaled grand total) so the bid always reconciles.
function bidPrice(j){ const m=j.margin; return (j.lines||[]).filter(l=>l.furn!=='client').reduce((s,l)=>s+pricedAmt(lineAmt(l),m),0); }
// Sales tax (contractor's own rate) on the margin-priced subtotal. bidWithTax is
// what the client actually pays; bidPrice stays the pre-tax work value.
function jobTaxRate(j){ return j.tax_rate==null ? 0 : Math.max(0, Number(j.tax_rate)||0); }
function taxAmt(j){ return Math.round(bidPrice(j) * jobTaxRate(j)/100); }
function bidWithTax(j){ return bidPrice(j) + taxAmt(j); }
// Mirror of server proposal.js: group scope lines by room/area, in first-seen order.
function groupSections(lines){
  const groups=[], byName={};
  (lines||[]).forEach(l=>{ const name=String(l.section||'').trim();
    if(!byName[name]){ byName[name]={name,lines:[],subtotal:0}; byName[name]._k=groups.length; groups.push(byName[name]); }
    byName[name].lines.push(l); byName[name].subtotal+=lineAmt(l);
  });
  return groups;
}
// Only worth showing headings/subtotals when the job spans more than one room.
function jobHasSections(lines){
  const named={}; let blank=false;
  (lines||[]).forEach(l=>{ const n=String(l.section||'').trim(); if(n) named[n]=1; else blank=true; });
  const k=Object.keys(named).length; return k>1 || (k===1 && blank);
}

function lineEditor(l){
  const t = l.type==='hourly'?'hourly':l.type==='unit'?'unit':'fixed';
  const ctl = t==='unit'
    ? `<input class="mini" type="number" min="0" step="any" value="${l.qty||0}" oninput="updLine('${l.id}','qty',this.value)" placeholder="qty" title="Quantity (e.g. square feet)"/>
       <select class="mini" onchange="updLine('${l.id}','unit',this.value)" title="Unit">${unitOpts(l.unit)}</select>
       <input class="mini" type="number" min="0" step="any" value="${l.rate||0}" oninput="updLine('${l.id}','rate',this.value)" placeholder="$/unit" title="Price per unit"/>`
    : t==='hourly'
    ? `<input class="mini" type="number" min="0" value="${l.hours||0}" oninput="updLine('${l.id}','hours',this.value)" placeholder="hrs"/>
       <input class="mini" type="number" min="0" value="${l.rate||0}" oninput="updLine('${l.id}','rate',this.value)" placeholder="$/hr"/>`
    : `<input class="mini" type="number" min="0" value="${l.price||0}" oninput="updLine('${l.id}','price',this.value)" placeholder="price"/>`;
  return `<div class="line">
      <div class="ltop">
        <input class="ldesc" value="${escAttr(l.desc)}" oninput="updLine('${l.id}','desc',this.value)" placeholder="Describe the work or item"/>
        <button class="del" onclick="delLine('${l.id}')" title="Remove">✕</button>
      </div>
      <div class="lroom"><input value="${escAttr(l.section||'')}" onchange="updLine('${l.id}','section',this.value)" placeholder="Room / area (e.g. Bathroom)" title="Group this line under a room or area"/></div>
      <div class="lctl ${t}">
        <select class="mini ltype" onchange="updLine('${l.id}','type',this.value)">
          <option value="fixed" ${t==='fixed'?'selected':''}>Fixed</option>
          <option value="unit" ${t==='unit'?'selected':''}>Per unit</option>
          <option value="hourly" ${t==='hourly'?'selected':''}>Hourly</option>
        </select>
        ${ctl}
        <span class="lt-amt" data-lid="${l.id}">${l.furn==='client'?'by client':money(lineAmt(l))}</span>
      </div>
      <div class="furn">
        <button class="${l.furn!=='client'?'on':''}" onclick="updLine('${l.id}','furn','you')">You furnish</button>
        <button class="${l.furn==='client'?'on':''}" onclick="updLine('${l.id}','furn','client')">Client furnishes</button>
      </div>
    </div>`;
}

function tabBuild(j){

    lines = groupSections(j.lines).map(g=>{
      const name = g.name || 'Other work';

      return `<div class="secgroup"><div class="sechead"><span>${esc(name)}</span><span class="secsub">${money(sub)}</span></div>

  return `<div class="h-eyebrow" style="margin-bottom:8px">Step 2 · Private estimating</div>
    <div class="note">AI prices are rough placeholders — you set the real numbers here.</div>
    ${(j.transcript||'').trim() ? `<button class="btn ghost full" style="margin-bottom:12px" onclick="rebuildWithAI('${j.id}',this)">🪄 Rebuild these lines from the conversation with AI</button>` : ''}

    <select class="tplsel" onchange="applyTemplate(this.value);this.value=''" title="Add a typical starter checklist for your trade">
      <option value="">📋 Start from a trade template…</option>

    </select>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn ghost addline" style="flex:1" onclick="addLine()">+ Add line</button>
      <button class="btn ghost addline" style="flex:1" onclick="openSkuPicker()">+ From price book</button>
    </div>
    ${AI_VISUALIZE?`<button class="btn full" style="margin-top:10px" onclick="vizStart('${j.id}')">✨ See it in their kitchen</button>
      <div class="hint" style="margin-top:4px">Pick a material that has a photo, add the client's room, and AI renders it in — the picture is added to the bid.</div>`:''}

    <div class="totbar"><span class="tl">Client price</span><span class="tv">${money(total)}</span></div>

      : `<div class="hint" style="margin-top:-6px">No margin set — the client pays your line total. Add a profit margin below.</div>`}

    <div class="taxrow-edit" style="display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap">

      <span class="mono" style="color:var(--muted)">%</span>

// "Request a payment" block — only shown when the server has payments configured.
function paymentsBlock(j){
  if(!PAYMENTS || !PAYMENTS.configured) return '';
  if(!PAYMENTS.charges_enabled){
    return `<div class="paybox"><h3>Get paid for this job</h3>
      <div class="hint">Set up payments once and your clients can pay you by card right from a bid.</div>
      <button class="btn sm" style="margin-top:10px" onclick="go('settings')">Set up payments →</button></div>`;
  }
  const reqs = PAYREQS[j.id];
  if(reqs===undefined){ loadJobPayReqs(j.id); }
  const total = bidWithTax(j); // client pays the tax-inclusive total
  const pct = (j.deposit_pct==null?25:j.deposit_pct);
  const deposit = Math.round(total * pct/100);
  // What's already collected (from any paid link or the proposal's deposit) drives
  // the "remaining balance" so the contractor can bill exactly what's left.
  const paid = (reqs||[]).filter(r=>r.status==='paid').reduce((s,r)=>s+(+r.amount||0),0);
  const balance = Math.max(0, total - paid);
  const list = (reqs||[]).map(r=>{
    const st = r.status==='paid'?`<span class="badge active">Paid</span>`
      : r.status==='canceled'?`<span class="badge canceled">Canceled</span>`
      : `<span class="badge trial">Awaiting payment</span>`;
    const actions = r.status==='pending'
      ? `<button class="btn ghost sm" onclick="copyPayLink('${escAttr(r.url||'')}',this)">Copy link</button>
         <button class="btn ghost sm" onclick="cancelPayReq('${j.id}','${r.id}')">Cancel</button>`
      : '';
    return `<div class="payrow"><div><div class="payamt">${money(r.amount)}</div>${r.description?`<div class="hint" style="margin-top:2px">${esc(r.description)}</div>`:''}${st}</div>
      <div class="payact">${actions}</div></div>`;
  }).join('');
  return `<div class="paybox"><h3>Get paid for this job</h3>
    <div class="hint">Bid <b style="color:var(--paper)">${money(total)}</b>${paid?` · collected <b style="color:#8fd0a8">${money(paid)}</b> · remaining <b style="color:var(--paper)">${money(balance)}</b>`:''}. Send a card link for any of these — money goes straight to your account.</div>
    <div class="amtquick" style="margin-top:10px">
      <button class="btn ghost sm" type="button" onclick="setPr(${deposit},'Deposit')">Deposit ${pct}% · ${money(deposit)}</button>
      ${paid?`<button class="btn ghost sm" type="button" onclick="setPr(${balance},'Final balance')">Balance · ${money(balance)}</button>`:''}
      <button class="btn ghost sm" type="button" onclick="setPr(null,'Materials')">Materials upfront</button>
      <button class="btn ghost sm" type="button" onclick="setPr(${total},'Full payment')">Full · ${money(total)}</button>
    </div>
    <div class="row2" style="margin-top:6px">
      <div><label class="fld">Amount</label><input id="prAmt" class="input" type="number" min="1" value="${deposit||total||''}" placeholder="0"/></div>
      <div><label class="fld">What's this for?</label><input id="prPurpose" class="input" placeholder="e.g. Materials deposit" value="Deposit"/></div>
    </div>
    <label class="fld">Client name (optional)</label><input id="prName" class="input" placeholder="e.g. Reyes" value="${escAttr(j.customer||'')}"/>
    <button class="btn blue full" style="margin-top:10px" onclick="createPayReq('${j.id}',this)">Create payment link</button>
    <div class="hint" style="margin-top:8px">The label shows on your client's checkout, so deposits, material costs and the final balance are easy to tell apart.</div>
    ${(reqs&&reqs.length)?`<div class="paylist">${list}</div>`:(reqs?'':'<div class="hint" style="margin-top:10px">Loading…</div>')}</div>`;
}

// Client preview — mirrors the server PDF. margin & notes are never referenced here.
function clientHTML(j){
  const baseLines=(j.lines||[]).filter(l=>l.furn!=='client');
  const clientLines=(j.lines||[]).filter(l=>l.furn==='client');
  const f=marginFactor(j.margin), showRate=(f===1);

  // the rate is the contractor's cost and wouldn't reconcile with the priced amount).
  const cDetail=(l)=> !showRate ? '' : l.type==='hourly' ? `<small>${l.hours||0} hrs @ ${money(l.rate)}/hr</small>`
    : l.type==='unit' ? `<small>${l.qty||0} ${esc(l.unit||'unit')} @ ${money(l.rate)}/${esc(l.unit||'unit')}</small>` : '';
  const cAmt=(l)=>Math.round(lineAmt(l)*f);          // priced line amount
  const cSub=(g)=>g.lines.reduce((s,l)=>s+cAmt(l),0); // subtotal = sum of priced lines
  const subtotal=bidPrice(j), taxRate=jobTaxRate(j), tax=taxAmt(j), total=bidWithTax(j);
  const dt=new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  return `<div class="client">
    <div class="client-head">
      ${SETTINGS.logo?`<img class="client-logo" src="${SETTINGS.logo}" alt=""/>`:''}
      ${SETTINGS.logo?'':`<div class="co">${esc(SETTINGS.company)||'Your Company'}</div>`}
    </div>
    <div class="client-body">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div><h4 style="margin-top:0">Prepared for</h4><div style="font-weight:600">${esc(j.customer||j.title)||'Project'}</div>${j.customer?`<div class="cnote" style="margin-top:2px">${esc(j.title)}</div>`:''}</div>
        <div class="cnote">${dt}</div>
      </div>
      <h4>Scope of work</h4>
      ${ baseLines.length===0 ? '<div class="cnote">No items yet.</div>'
        : jobHasSections(baseLines)
          ? groupSections(baseLines).map(g=>`<div class="csec"><div class="csec-h">${esc(g.name||'Other work')}</div>
              ${g.lines.map(l=>`<div class="cline"><div class="cd">${esc(l.desc)||'Item'}${cDetail(l)}</div><div class="ca">${money(cAmt(l))}</div></div>`).join('')}
              <div class="cline csub"><div class="cd">${esc(g.name||'Other work')} subtotal</div><div class="ca">${money(cSub(g))}</div></div></div>`).join('')
          : baseLines.map(l=>`<div class="cline"><div class="cd">${esc(l.desc)||'Item'}${cDetail(l)}</div><div class="ca">${money(cAmt(l))}</div></div>`).join('') }
      ${tax>0?`<div class="cline" style="margin-top:10px"><div class="cd">Subtotal</div><div class="ca">${money(subtotal)}</div></div>
      <div class="cline"><div class="cd" style="color:#8a7f68">Sales tax (${taxRate}%)</div><div class="ca" style="color:#8a7f68">${money(tax)}</div></div>`:''}
      <div class="ctotal"><span class="l">Total</span><span class="v">${money(total)}</span></div>

      ${clientLines.length?`<h4>Provided by client</h4>${clientLines.map(l=>`<div class="cline"><div class="cd">${esc(l.desc)}</div><div class="ca" style="color:#8a7f68">by client</div></div>`).join('')}`:''}

      ${(j.upgrades||[]).length?`<h4>Optional upgrades</h4>${j.upgrades.map(u=>`<div class="cup"><span>${esc(u.desc)}</span><span class="ca">+ ${money(Math.round((+u.price||0)*f))}</span></div>`).join('')}`:''}

      ${(j.exclusions||[]).length?`<h4>Not included</h4>${j.exclusions.map(e=>`<div class="cexcl">${esc(e)}</div>`).join('')}`:''}
      ${(j.assumptions||[]).length?`<h4>Notes</h4>${j.assumptions.map(a=>`<div class="cnote">• ${esc(a)}</div>`).join('')}`:''}
      ${(()=>{const ph=(j.photos||[]).filter(p=>p.showOnBid);return ph.length?`<h4>Photos</h4><div class="cgallery">${ph.map(p=>`<img src="${p._pending?p.dataUrl:p.url}" alt="Project photo"/>`).join('')}</div>`:'';})()}
    </div>
    <div class="cfoot"><div class="ccontact">${[SETTINGS.company,SETTINGS.name,SETTINGS.phone,(USER&&USER.email)||'',SETTINGS.license?('Lic. '+SETTINGS.license):''].filter(Boolean).map(esc).join(' · ')||'Add your contact info in Setup'}</div>This is an estimate, not a contract. Pricing valid 30 days from the date above.</div>
  </div>`;
}

// Share a bid via the phone's own Messages / email (free — sends from the
// contractor's number/email). Gets a secure public link from the server first.
let LAST_LINK='';
function focusCustomer(){ const el=document.getElementById('custInput'); if(el){ window.scrollTo(0,0); el.focus(); el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),1200); } }
async function shareBid(mode, btn){
  const j=currentJob(); if(!j) return;
  if(!entitled()){ go('paywall'); return; }
  if(!online || !TOKEN){ toast('Connect to the internet to create a shareable bid link.','warn'); return; }
  // Gently nudge for a customer name — it personalizes the proposal greeting.
  if(!((j.customer||'').trim())){
    if(!confirm('No customer name on this bid yet — it personalizes the proposal. Send anyway?')){ focusCustomer(); return; }
  }
  const orig = btn ? btn.textContent : '';
  if(btn){ btn.disabled=true; btn.textContent='Preparing…'; }
  try{
    touch(j); persist();
    await syncNow(true); // make sure the server has the latest bid before it renders the link
    const r = await api('/api/jobs/'+j.id+'/share');
    const url = r.url; LAST_LINK=url;
    // Only mark it Sent once the link actually exists (so a failure never leaves a
    // "sent" bid with no link).
    if(j.status==='draft'){ j.status='sent'; if(!j.sent_at) j.sent_at=Date.now(); touch(j); persist(); syncNow(); }
    const who = SETTINGS.company || 'your contractor';
    const firstName = ((j.customer||'').trim().split(/\s+/)[0]||'').slice(0,40);
    const hi = firstName ? `Hi ${firstName}, here's` : `Here's`;
    const msg = `${hi} your estimate from ${who}: ${url}`;
    const subject = 'Your estimate'+(j.title?(' — '+j.title):'');
    if(btn){ btn.disabled=false; btn.textContent=orig; }
    if(mode==='text'){ location.href='sms:?&body='+encodeURIComponent(msg); }
    else if(mode==='email'){ location.href='mailto:?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(msg); }
    else if(mode==='copy'){ const ok=await copyText(url); toast(ok?'✓ Bid link copied — paste it anywhere.':('Link: '+url), ok?'ok':'warn', ok?2600:7000); }
    else if(navigator.share){ try{ await navigator.share({title:subject, text:`Here's your estimate from ${who}`, url}); }catch(e){} }
    else { const ok=await copyText(url); toast(ok?'✓ Bid link copied — paste it anywhere.':('Link: '+url), ok?'ok':'warn', ok?2600:7000); }
    if(state.view==='job') render();
  }catch(e){
    if(btn){ btn.disabled=false; btn.textContent=orig; }
    if(e.status===402){ gate402(e); return; }
    toast(e.message||'Could not create the share link.','bad');
  }
}

async function sendPDF(){
  const j=currentJob(); if(!j) return;
  if(!entitled()){ go('paywall'); return; }
  const btn=document.getElementById('pdfBtn');
  // Ensure the server has the latest version; only advance a draft to "sent" (never
  // knock a signed/scheduled job back a stage on a re-export).
  if(j.status==='draft'){ j.status='sent'; if(!j.sent_at) j.sent_at=Date.now(); }
  touch(j); persist();
  if(online && TOKEN){
    if(btn){ btn.disabled=true; btn.textContent='Preparing…'; }
    try{
      await syncNow(true);
      const res = await fetch(API+'/api/jobs/'+j.id+'/pdf', { headers:{'Authorization':'Bearer '+TOKEN} });
      if(res.status===402){ if(btn){ btn.disabled=false; btn.textContent='Save / Send PDF'; } await loadBilling(); go('paywall'); return; }
      if(!res.ok) throw new Error('pdf '+res.status);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
      setTimeout(()=>URL.revokeObjectURL(url), 60000);
      if(btn){ btn.disabled=false; btn.textContent='Save / Send PDF'; }
      return;
    }catch(e){ if(btn){ btn.disabled=false; btn.textContent='Save / Send PDF'; } }
  }
  // Offline / failed → browser print fallback (spec allows this).
  printClient();
}
function printClient(){
  const j=currentJob(); if(!j) return;
  document.getElementById('printArea').innerHTML = clientHTML(j);
  window.print();
}

/* ---------- SETTINGS ---------- */
function billingSection(){
  if(!BILLING || !BILLING.configured) return '';
  const s=BILLING.status;
  const label = s==='active'?'Active':(BILLING.in_trial?'Free trial':(s==='past_due'?'Past due':(s==='canceled'?'Canceled':'No subscription')));
  const cls = s==='active'?'active':(BILLING.in_trial?'trial':(s==='past_due'?'past_due':(s==='canceled'?'canceled':'none')));
  const days=trialDaysLeft();
  let detail='';
  if(s==='active' && BILLING.current_period_end) detail='Renews '+new Date(BILLING.current_period_end).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'.';
  else if(BILLING.in_trial) detail=days+' day'+(days===1?'':'s')+' left in your free trial.';
  else if(!BILLING.entitled) detail='Subscribe to create and send new bids.';
  const btn = (s==='active'||BILLING.has_subscription)
    ? `<button class="btn ghost sm" onclick="openPortal(this)">Manage billing</button>`
    : `<button class="btn sm" onclick="startCheckout(this)">Subscribe</button>`;
  const pricing = (s!=='active' && !BILLING.has_subscription)
    ? `<div class="hint" style="margin-top:8px">When you subscribe: ${planSetup()>0?`a one-time <b style="color:var(--paper)">${priceStr(planSetup())} setup</b> + `:''}<b style="color:var(--paper)">${priceStr(planMonthly())}/mo</b>. Cancel anytime.</div>`
    : '';
  return `<div class="billbox"><h3>Subscription</h3>
    <div class="statline"><span class="badge ${cls}">${label}</span>${btn}</div>
    ${detail?`<div class="hint" style="margin-top:8px">${esc(detail)}</div>`:''}${pricing}</div>`;
}
// "Get paid" setup card — connects the contractor's own Stripe account so
// homeowners can pay them by card (and Klarna/Affirm once they enable it in Stripe).
function paymentsSection(){
  if(!PAYMENTS || !PAYMENTS.configured) return '';
  let badge, detail, btn;
  if(PAYMENTS.charges_enabled){
    badge=`<span class="badge active">Ready</span>`;
    detail='You can collect payments from clients. Open a job → Client view → “Request a payment”.';
    btn=`<button class="btn ghost sm" onclick="startConnect(this)">Update payout details</button>`;
  } else if(PAYMENTS.connected){
    badge=`<span class="badge past_due">Almost done</span>`;

    try{ const r=await api('/api/leads/import',{method:'POST',body:JSON.stringify({items:rows})}); await loadLeads(); toast('✓ Imported '+(r.added||0)+' leads','ok'); }
    catch(err){ toast(err.message||'Import failed.','bad'); } };
  rd.readAsText(f);
}
function parseLeadCsv(txt){
  const lines=txt.split(/\r?\n/).filter(l=>l.trim()); if(lines.length<2) return [];
  const split=(line)=>{ const out=[]; let cur='',q=false; for(let i=0;i<line.length;i++){ const c=line[i]; if(c==='"'){ if(q&&line[i+1]==='"'){cur+='"';i++;} else q=!q; } else if(c===','&&!q){ out.push(cur); cur=''; } else cur+=c; } out.push(cur); return out.map(s=>s.trim()); };
  const head=split(lines[0]).map(h=>h.toLowerCase().replace(/[^a-z]/g,''));
  const idx=(names)=>{ for(const n of names){ const i=head.indexOf(n); if(i>=0) return i; } return -1; };
  const I={ name:idx(['name','fullname','customer']), phone:idx(['phone','phonenumber','mobile']), email:idx(['email','emailaddress']), source:idx(['source','platform','channel']), type:idx(['jobtype','service','projecttype','type']), city:idx(['city','address','location']), msg:idx(['message','notes','details','description','comments']) };
  const rows=[];
  for(let i=1;i<lines.length&&rows.length<1000;i++){ const c=split(lines[i]); const get=k=>k>=0?(c[k]||''):'';
    const r={ name:get(I.name), phone:get(I.phone), email:get(I.email), source:get(I.source)||'CSV', job_type:get(I.type), city:get(I.city), message:get(I.msg) };
    if(r.name||r.phone||r.email) rows.push(r); }
  return rows;
}
function readImageScaled(file,max,q){ return new Promise((res,rej)=>{ const rd=new FileReader(); rd.onload=e=>{ const img=new Image(); img.onload=()=>{ let w=img.width||1,h=img.height||1; if(w>max||h>max){ const s=Math.min(max/w,max/h); w=Math.round(w*s); h=Math.round(h*s);} const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); res(c.toDataURL('image/jpeg',q||0.82)); }; img.onerror=rej; img.src=e.target.result; }; rd.onerror=rej; rd.readAsDataURL(file); }); }

/* ---- "See it in their kitchen": render a material into the client's room ----
   Fire-and-poll: POST starts the render and returns fast; we poll for the result
   so a long render can't time out the connection. Inputs (material + room photo)
   are kept in VIZ so "Try again" never makes the user re-upload. */
let VIZ={jobId:null, sku:null, roomImage:null};
function vizStart(jobId){
  if(!AI_VISUALIZE){ toast('Add your OpenAI key in setup to turn on AI visualization.','warn',5000); return; }
  if(!online||!TOKEN){ toast('Connect to the internet to render.','warn'); return; }

  openSkuPicker('viz');
}
function vizPickMaterial(id){

function vizShowOverlay(show,msg){ const el=document.getElementById('vizOverlay'); if(!el) return; if(msg){ const m=document.getElementById('vizMsg'); if(m) m.textContent=msg; } el.style.display=show?'flex':'none'; }
function vizShowResult(url){
  const img=document.getElementById('vizResultImg'); if(img){ img.src=url; img.style.display='block'; }
  const er=document.getElementById('vizResultErr'); if(er) er.style.display='none';
  const cap=document.getElementById('vizResultCap'); if(cap){ cap.textContent='✓ Added to the bid · AI visualization — for illustration only'; cap.style.display='block'; }
  const rb=document.getElementById('vizRetryBtn'); if(rb) rb.style.display='none';

function vizShowError(msg){
  const img=document.getElementById('vizResultImg'); if(img) img.style.display='none';
  const er=document.getElementById('vizResultErr'); if(er){ er.textContent=msg; er.style.display='block'; }
  const cap=document.getElementById('vizResultCap'); if(cap) cap.style.display='none';
  const rb=document.getElementById('vizRetryBtn'); if(rb) rb.style.display=VIZ.roomImage?'block':'none';
  const res=document.getElementById('vizResult'); if(res) res.style.display='flex';
}
async function vizRoomPick(input){
  const f=input.files&&input.files[0]; input.value='';
  if(!f||!VIZ.jobId||!VIZ.sku) return;
  if(!/^image\//.test(f.type)){ toast('Choose an image of the room.','warn'); return; }
  let roomImage; try{ roomImage=await readImageScaled(f,1024,0.85); }catch(e){ toast('Could not read that image.','bad'); return; }
  VIZ.roomImage=roomImage; // kept so a retry never re-uploads
  vizRender();
}
async function vizRender(){
  const res=document.getElementById('vizResult'); if(res) res.style.display='none';
  if(!VIZ.jobId||!VIZ.sku||!VIZ.roomImage){ toast('Pick a material and a room photo first.','warn'); return; }
  vizShowOverlay(true,'Rendering '+(VIZ.sku.name||'the material')+' into the room…');
  let token;
  try{
    // Retry transient failures (network blip / server updating / 502-504) with
    // backoff so a momentary hiccup self-heals instead of erroring out.
    let r, lastErr;
    for(let attempt=0; attempt<3 && !r; attempt++){
      try{ r=await api('/api/jobs/'+VIZ.jobId+'/visualize',{method:'POST', body:JSON.stringify({ roomImage:VIZ.roomImage, skuId:VIZ.sku.id })}); }
      catch(e){ lastErr=e; const transient=!e.status || e.status>=502; if(!transient) throw e; if(attempt<2){ vizShowOverlay(true,'Reconnecting…'); await new Promise(res=>setTimeout(res, 2500*(attempt+1))); } }
    }
    if(!r) throw lastErr;
    token=r.token;
  }catch(e){ vizShowOverlay(false); if(e.status===402){ gate402(e); return; }
    const net = !e.status || /fetch|network/i.test(e.message||'');
    vizShowError(net ? 'Couldn’t reach the server — it may be updating. Your photo is saved, so tap Try again in a moment.' : (e.message||'Could not start the render.')); return; }
  if(!token){ vizShowOverlay(false); vizShowError('Could not start the render.'); return; }
  // Poll up to ~2 minutes; the render runs server-side regardless of this tab.
  const started=Date.now();
  const poll=async()=>{
    try{
      const s=await api('/api/jobs/'+VIZ.jobId+'/visualize/'+token);
      if(s.status==='done'){ await refreshJob(VIZ.jobId); vizShowOverlay(false); vizShowResult(s.photo&&s.photo.url); toast('✓ Render added to the bid','ok'); return; }
      if(s.status==='error'){ vizShowOverlay(false); vizShowError(s.error||'The render didn’t finish — tap Try again.'); return; }
    }catch(e){ /* transient network blip — keep polling */ }
    if(Date.now()-started>125000){ vizShowOverlay(false); vizShowError('This render took too long. Your photo is saved — tap Try again.'); return; }
    setTimeout(poll, 2500);
  };
  setTimeout(poll, 2500);
}

// Resize the chosen image to a small data-URI so it stays well under the server's
// limit, then save it like any other setting. PNG keeps logo transparency; if it
// comes out large we fall back to JPEG.
function uploadLogo(input){
  const f=input.files&&input.files[0]; if(!f) return;
  if(!/^image\//.test(f.type)){ alert('Please choose an image file.'); return; }
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=320; let w=img.width||1, h=img.height||1;
      if(w>max||h>max){ const s=Math.min(max/w,max/h); w=Math.round(w*s); h=Math.round(h*s); }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      let data=c.toDataURL('image/png');
      if(data.length>180000) data=c.toDataURL('image/jpeg',0.85);
      if(data.length>240000){ alert('That image is too detailed — try a simpler or smaller logo.'); return; }
      setS('logo',data); render();
    };
    img.onerror=()=>alert('Could not read that image.');
    img.src=e.target.result;
  };
  reader.readAsDataURL(f);
}

async function changePw(btn){
  const g=id=>{ const e=document.getElementById(id); return e?e.value:''; };
  const msg=document.getElementById('pwMsg');
  const show=(t,ok)=>{ if(msg){ msg.textContent=t; msg.style.color=ok?'#8fce8f':'#e88'; } };
  const cur=g('pwCur'), n1=g('pwNew'), n2=g('pwNew2');
  if(!cur||!n1){ show('Fill in your current and new password.'); return; }
  if(n1.length<8){ show('New password must be at least 8 characters.'); return; }
  if(n1!==n2){ show('The new passwords don’t match.'); return; }
  if(!online||!TOKEN){ show('You need to be online and signed in to change your password.'); return; }
  btn.disabled=true; show('Updating…', true);
  try{
    await api('/api/auth/change-password',{method:'POST', body:JSON.stringify({currentPassword:cur, newPassword:n1})});
    show('Password updated. ✓', true);
    ['pwCur','pwNew','pwNew2'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
  }catch(e){
    show(e.message||'Could not update password.');
  }finally{ btn.disabled=false; }
}

/* ---------- toasts (non-blocking confirmations / soft errors) ---------- */
function toast(msg, kind, ms){
  const box=document.getElementById('toasts'); if(!box){ return; }
  const el=document.createElement('div');
  el.className='toast '+(kind==='ok'?'ok':kind==='bad'?'bad':kind==='warn'?'warn':'');
  el.textContent=msg;
  box.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .2s'; el.style.opacity='0'; setTimeout(()=>el.remove(),220); }, ms||3200);
}
// Copy text to the clipboard with a graceful fallback; resolves true on success.
async function copyText(text){
  try{ if(navigator.clipboard && window.isSecureContext){ await navigator.clipboard.writeText(text); return true; } }catch(e){}
  try{ const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select(); const ok=document.execCommand('copy'); ta.remove(); return ok; }catch(e){ return false; }
}

/* ---------- voice dictation ---------- */
let rec=null, recording=false, micWanted=false;
// One voice path for every device: record → Whisper (server transcription). It's
// the most accurate and identical on iPhone, Android, and desktop. The browser's
// live speech API is only a fallback for when the server has no transcription key.
function liveSpeechSupported(){ return ('webkitSpeechRecognition' in window) || ('SpeechRecognition' in window); }
function recordSupported(){ return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder); }
function useWhisper(){ return recordSupported() && AI_TRANSCRIBE; } // primary path when configured
function speechSupported(){ return useWhisper() || liveSpeechSupported(); }
function updateMic(){ const b=document.getElementById('micBtn'); if(b) b.classList.toggle('rec',recording);
  const txt = micState==='transcribing'?'Transcribing…' : recording?'Recording… Tap Again to Stop' : 'Tap to Start Recording';
  const lbl=document.getElementById('micLbl'); if(lbl){ lbl.textContent=txt; return; }
  const l=b&&b.querySelector('.lbl'); if(l) l.textContent=txt; }

/* ---- Record → server transcription (universal voice, incl. iPhone) ---- */
let mediaRec=null, mediaChunks=[], mediaStream=null, micState='idle';
function pickAudioMime(){ const c=['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg']; for(const m of c){ if(window.MediaRecorder&&MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported(m)) return m; } return ''; }
let recBusy=false;   // a record session is mid-setup or running
let recAbort=false;  // released before getUserMedia resolved → stop the moment it starts
let recTimer=null;   // safety auto-stop so a stuck press can't record forever
function buzz(ms){ try{ navigator.vibrate && navigator.vibrate(ms); }catch(e){} }

// Begin a recording (Whisper path). Robust to a release landing before the mic
// permission resolves — recAbort makes us stop the instant capture is live.
async function startRecord(){
  if(recording||recBusy) return;
  if(!online||!TOKEN){ toast('Connect to the internet to dictate.','warn'); return; }
  recBusy=true; recAbort=false;
  let stream;
  try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ recBusy=false; toast('Allow microphone access to dictate.','warn',5000); return; }
  mediaStream=stream; mediaChunks=[];
  const mime=pickAudioMime();
  try{ mediaRec=new MediaRecorder(stream, mime?{mimeType:mime}:undefined); }
  catch(e){ try{ mediaRec=new MediaRecorder(stream); }catch(_){ recBusy=false; stream.getTracks().forEach(t=>t.stop()); toast('Recording isn’t supported here.','warn'); return; } }
  mediaRec.ondataavailable=(ev)=>{ if(ev.data&&ev.data.size) mediaChunks.push(ev.data); };
  mediaRec.onstop=async ()=>{
    stopVAD();
    if(recTimer){ clearTimeout(recTimer); recTimer=null; }
    try{ mediaStream&&mediaStream.getTracks().forEach(t=>t.stop()); }catch(e){}
    const blob=new Blob(mediaChunks,{type:(mediaRec&&mediaRec.mimeType)||'audio/webm'});
    recBusy=false; micState='idle';
    if(blob.size<900){ updateMic(); toast('Didn’t catch anything — tap and speak.','warn'); return; }
    const dataUrl=await new Promise((res)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>res(''); r.readAsDataURL(blob); });
    try{
      const r=await api('/api/assist/transcribe',{method:'POST', body:JSON.stringify({ audio:dataUrl, lang:(SETTINGS.from||'es') })});
      const ta=document.getElementById('capText');
      if(ta && (r.text||'').trim()){
        ta.value=[ta.value.trim(), r.text.trim()].filter(Boolean).join(' ').replace(/\s+/g,' ');
        capDraft('text', ta.value); ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,300)+'px'; ta.scrollTop=ta.scrollHeight;
        buzz(12); scheduleIntake(); // pull the job details from what they just said
      } else if(!(r.text||'').trim()) toast('Didn’t catch that — tap and speak clearly.','warn');
    }catch(e){ if(e.status===402){ gate402(e); } else toast(e.message||'Could not transcribe.','bad',5000); }
    updateMic();
  };
  mediaRec.start();
  recording=true; micState='recording'; updateMic(); buzz(18); startVAD(mediaStream);
  recTimer=setTimeout(()=>{ if(recording){ toast('That was a long one — sending it now.','warn'); stopRecord(); } }, 60000);
  const ta0=document.getElementById('capText'); if(ta0) setTimeout(()=>{ try{ const rr=ta0.getBoundingClientRect(); window.scrollTo({top:Math.max(0,window.scrollY+rr.top-104),behavior:'smooth'}); }catch(_){} },90);
  if(recAbort) stopRecord(); // they let go during setup
}
function stopRecord(){
  stopVAD();
  if(!recording){ recAbort=true; return; } // not live yet → abort as soon as it is
  recording=false; micState='transcribing'; updateMic();
  try{ mediaRec&&mediaRec.state!=='inactive'&&mediaRec.stop(); }catch(e){}
}

// Tap to talk: tap once to start; the AI listens and auto-stops when you go quiet
// (~2.5s of silence after you've spoken). Tap again to stop early.
let vadCtx=null, vadRAF=null, vadSpoke=false, vadQuietAt=0;
function startVAD(stream){
  try{
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC||!stream) return;
    vadCtx=new AC(); const src=vadCtx.createMediaStreamSource(stream);
    const an=vadCtx.createAnalyser(); an.fftSize=1024; src.connect(an);
    const buf=new Uint8Array(an.fftSize); vadSpoke=false; vadQuietAt=0;
    const SPEAK=0.022, SILENCE_MS=2500;
    const tick=()=>{
      if(!recording){ stopVAD(); return; }
      an.getByteTimeDomainData(buf);
      let sum=0; for(let i=0;i<buf.length;i++){ const v=(buf[i]-128)/128; sum+=v*v; }
      const rms=Math.sqrt(sum/buf.length), now=Date.now();
      if(rms>SPEAK){ vadSpoke=true; vadQuietAt=0; }
      else if(vadSpoke){ if(!vadQuietAt) vadQuietAt=now; else if(now-vadQuietAt>SILENCE_MS){ stopVAD(); if(recording){ buzz(12); stopRecord(); } return; } }
      vadRAF=requestAnimationFrame(tick);
    };
    vadRAF=requestAnimationFrame(tick);
  }catch(e){}
}
function stopVAD(){ if(vadRAF){ cancelAnimationFrame(vadRAF); vadRAF=null; } if(vadCtx){ try{ vadCtx.close(); }catch(e){} vadCtx=null; } }
function micTap(){
  if(recording||recBusy){ // tap again → stop / cancel
    if(useWhisper()) stopRecord();
    else { micWanted=false; if(rec){ try{ rec.stop(); }catch(e){} } recording=false; updateMic(); }
    stopVAD();
    return;
  }
  if(useWhisper()) startRecord();
  else if(liveSpeechSupported()) startLiveSpeech();
}
// Live-speech fallback (only when the server has no Whisper key). micTap begins it;
// tap again stops it (Web Speech also ends on its own pause and restarts).
function startLiveSpeech(){
  if(recording) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  rec=new SR();
  rec.lang=SPEECH_LANG[SETTINGS.from||'es']||'es-US';
  rec.continuous=true; rec.interimResults=true; rec.maxAlternatives=1;
  micWanted=true;
  // Base = whatever's already in the box. dictBase is updated on each auto-restart
  // so continuous dictation across pauses never loses what was already said.
  const ta0=document.getElementById('capText');
  let dictBase=ta0&&ta0.value?ta0.value.trim():''; // finalized text BEFORE this session
  let sessionFinal='';                              // this session's finalized text
  const join3=(a,b,c)=>[a,b,c].map(s=>(s||'').trim()).filter(Boolean).join(' ').replace(/\s+/g,' ');
  rec.onresult=(e)=>{
    // Collapse the results into one clean transcript. Mobile engines (Android) emit
    // each growing partial as its OWN final ("Kitch","Kitchen","Kitchen 8",…). When a
    // new final extends the previous one (prefix), REPLACE it; only push genuinely
    // new phrases. The latest interim is kept transient (assigned, not appended).
    const finals=[]; let interim='';
    for(let i=0;i<e.results.length;i++){
      const r=e.results[i]; const t=(r[0].transcript||'').trim();
      if(r.isFinal){
        if(!t) continue;
        const prev=finals[finals.length-1];
        if(!prev) finals.push(t);
        else if(t===prev || prev.startsWith(t)) {/* same or shorter — ignore */}
        else if(t.startsWith(prev)) finals[finals.length-1]=t; // grew the same phrase
        else finals.push(t);                                   // a new phrase
      } else interim=r[0].transcript;
    }
    sessionFinal=finals.join(' ');
    const ta=document.getElementById('capText');
    if(ta){
      ta.value=join3(dictBase, sessionFinal, interim);
      capDraft('text', ta.value); scheduleIntake(); // persist + pull job details
      // Keep the newest words visible while talking: grow the box a little, then
      // pin it to the bottom so dictation never scrolls out of sight.
      ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight, 300)+'px';
      ta.scrollTop=ta.scrollHeight;
    }
  };
  // Mobile engines end after a short pause. If the user hasn't tapped Stop, fold only
  // the FINALIZED text (never the trailing interim) into the base and restart — so it
  // keeps going without re-recognizing and duplicating the last words.
  rec.onend=()=>{
    if(micWanted){
      dictBase=join3(dictBase, sessionFinal, ''); sessionFinal='';
      try{ rec.start(); return; }catch(e){}
    }
    recording=false; updateMic();
  };
  rec.onerror=(e)=>{
    const err=e&&e.error;
    if(err==='not-allowed'||err==='service-not-allowed'){ micWanted=false; recording=false; updateMic(); toast('Microphone is blocked — allow mic access in your browser to dictate.','warn',5000); }
    // 'no-speech' / 'aborted' / 'network' fall through to onend, which restarts.
  };
  try{
    rec.start(); recording=true; updateMic();
    // Align the notepad near the top so the label and the growing text are both
    // visible as they speak (scrollIntoView 'center' jumped awkwardly).
    if(ta0) setTimeout(()=>{ try{ const r=ta0.getBoundingClientRect(); window.scrollTo({top:Math.max(0, window.scrollY+r.top-104), behavior:'smooth'}); }catch(_){} }, 90);
  }catch(e){ micWanted=false; recording=false; updateMic(); }
}

/* ---------- photos (offline-capable: queued locally, uploaded on sync) ---------- */
function pickPhoto(mode){ const el=document.getElementById(mode==='cam'?'photoCamInput':'photoInput'); if(el) el.click(); }
async function handlePhotos(input){
  const j=currentJob(); if(!j) return; j.photos=j.photos||[];
  const files=Array.from(input.files||[]);
  for(const f of files){ if(j.photos.length>=8) break; try{ const dataUrl=await downscale(f); j.photos.push({localId:uid(), dataUrl, _pending:true, showOnBid:true}); }catch(e){} }
  input.value=''; touch(j); saveJobs(); render();
}
function downscale(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{ const img=new Image();
      img.onload=()=>{ const max=900; let w=img.width,h=img.height;
        if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',0.7)); };
      img.onerror=rej; img.src=r.result; };
    r.onerror=rej; r.readAsDataURL(file);
  });
}
async function delPhoto(i){
  const j=currentJob(); if(!j)return; const p=j.photos[i]; if(!p) return;
  if(p.id && !p._pending && online && TOKEN){ try{ await api('/api/jobs/'+j.id+'/photos/'+p.id,{method:'DELETE'}); }catch(e){} }
  j.photos.splice(i,1); touch(j); saveJobs(); render();
}
// Choose whether a photo appears on the client-facing bid (opt-in, default off).
async function togglePhotoBid(i){
  const j=currentJob(); if(!j)return; const p=j.photos[i]; if(!p) return;
  p.showOnBid=!p.showOnBid; touch(j); saveJobs(); render();
  // A pending (offline) photo carries the flag when it uploads; a synced one PATCHes now.
  if(p.id && !p._pending && online && TOKEN){
    try{ await api('/api/jobs/'+j.id+'/photos/'+p.id,{method:'PATCH', body:JSON.stringify({showOnBid:!!p.showOnBid})}); }catch(e){}
  }
}

/* ---------- capture-screen photos (staged before the job exists, then handed
   to the new job as pending uploads — no full re-render, to preserve typing) ---------- */
function capPhotoThumbs(){
  // Thumbnails only — the camera/upload actions are dedicated buttons above the grid.
  return CAP_PHOTOS.map((p,i)=>`<div class="thumb"><img src="${p.dataUrl}" alt="job photo"/><button class="x" onclick="capDelPhoto(${i})" title="Remove">✕</button></div>`).join('');
}
function renderCapPhotos(){ const g=document.getElementById('capPhotoGrid'); if(g) g.innerHTML=capPhotoThumbs(); }
function capPickPhoto(mode){ const el=document.getElementById(mode==='cam'?'capPhotoCamInput':'capPhotoInput'); if(el) el.click(); }
function openCapPhotoSheet(){ const el=document.getElementById('capPhotoSheet'); if(el) el.style.display='flex'; }
function closeCapPhotoSheet(){ const el=document.getElementById('capPhotoSheet'); if(el) el.style.display='none'; }
function capPhotoSource(which){ closeCapPhotoSheet(); capPickPhoto(which); }
async function capHandlePhotos(input){
  const files=Array.from(input.files||[]);
  for(const f of files){ if(CAP_PHOTOS.length>=8) break; try{ const dataUrl=await downscale(f); CAP_PHOTOS.push({localId:uid(), dataUrl, _pending:true, showOnBid:true}); }catch(e){} }
  input.value=''; renderCapPhotos();
}
function capDelPhoto(i){ CAP_PHOTOS.splice(i,1); renderCapPhotos(); }

/* ============ theme (light/dark, token-only) ============ */
// Default to the system preference; a saved choice ('light'|'dark') wins.
function effectiveTheme(){ const t=localStorage.getItem('bt_theme'); if(t==='light'||t==='dark') return t; return (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark'; }
function applyTheme(){ const t=effectiveTheme(); document.body.classList.toggle('light', t==='light'); const mc=document.querySelector('meta[name="theme-color"]'); if(mc) mc.setAttribute('content', t==='light' ? '#F1EEE7' : '#1F252C'); }
function themeChoice(){ return localStorage.getItem('bt_theme') || 'system'; }
function setTheme(mode){ if(mode==='system') localStorage.removeItem('bt_theme'); else localStorage.setItem('bt_theme', mode); applyTheme(); if(state.view==='settings') render(); }
// Follow the OS if the user hasn't picked an explicit theme.
if(window.matchMedia){ try{ window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', ()=>{ if(!localStorage.getItem('bt_theme')) applyTheme(); }); }catch(e){} }
applyTheme();

/* ============ celebrations (customer wins; toggleable like the theme) ============ */
function celebEnabled(){ return localStorage.getItem('bt_celebrate')!=='off'; }
function setCelebrate(on){ localStorage.setItem('bt_celebrate', on?'on':'off'); if(state.view==='settings') render(); if(on) celebrate('won','Celebrations on','You’ll see a little fanfare on a win'); }
function celebrate(kind, title, sub){
  if(!celebEnabled()) return;
  const wrap=document.getElementById('celebrate'), card=document.getElementById('celebrateCard'); if(!wrap||!card) return;
  const ic = kind==='paid' ? icon('revenue',26) : icon('check',26);
  card.innerHTML=`<div class="cc-ic ${kind==='paid'?'pay':''}">${ic}</div><div class="cc-t">${esc(title)}</div>${sub?`<div class="cc-s">${esc(sub)}</div>`:''}`;
  wrap.style.display='flex';
  const reduce=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(!reduce) confettiBurst(kind==='paid');
  clearTimeout(celebrate._t); celebrate._t=setTimeout(()=>{ wrap.style.display='none'; }, 2000);
}
function confettiBurst(gold){
  const cv=document.getElementById('confettiCanvas'); if(!cv) return;
  const dpr=window.devicePixelRatio||1, W=cv.clientWidth, H=cv.clientHeight;
  cv.width=W*dpr; cv.height=H*dpr; const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
  const colors=gold?['#EE9B2E','#FFC062','#F3EEE3','#6fce93']:['#6fce93','#EE9B2E','#F3EEE3','#3E7D5A'];
  const N=90, P=[];
  for(let i=0;i<N;i++){ P.push({x:W/2+(Math.random()-.5)*60, y:H/2, vx:(Math.random()-.5)*9, vy:Math.random()*-11-4, g:.34+Math.random()*.12, s:5+Math.random()*5, c:colors[i%colors.length], r:Math.random()*6, vr:(Math.random()-.5)*.5, life:0}); }
  const t0=performance.now();
  (function frame(t){
    const dt=Math.min(2,(t-t0)/16.7);
    ctx.clearRect(0,0,W,H);
    let alive=false;
    for(const p of P){ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr; p.life=t-t0;
      if(p.y<H+20){ alive=true; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r); ctx.globalAlpha=Math.max(0,1-(p.life/1900)); ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); ctx.restore(); } }
    if(alive && t-t0<1900) requestAnimationFrame(frame); else ctx.clearRect(0,0,W,H);
  })(t0);
}

/* ============ boot ============ */
(async function(){
  state.booted=true;
  attachFab();
  // Returning from Stripe Checkout / portal: clean the URL and refresh status.
  const params=new URLSearchParams(location.search);
  const billingReturn=params.get('billing');
  const paymentsReturn=params.get('payments'); // 'connected' | 'refresh' after Stripe onboarding
  if(billingReturn || paymentsReturn){ history.replaceState({}, '', location.pathname); }
  render();
  if(TOKEN){
    await Promise.all([syncNow(true), loadBilling(), loadPayments(), loadMe(), loadNotifications(), loadCollected(), loadQuickbooks()]);
    // Coming back from Stripe Connect onboarding — pull the fresh account status
    // and land the contractor on Setup so they see "Ready".
    if(paymentsReturn){ await refreshPayments(); state.view='settings'; }
    if(billingReturn==='success'){ state.view='home'; }
    render();
  }
})();
