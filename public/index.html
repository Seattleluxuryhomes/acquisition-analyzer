<!DOCTYPE html>
<!--
  BIDTRANSLATOR — Phase 1 front end. Same UI/flow/visual language as the prototype,
  refactored onto the hosted backend:
    - Accounts + sign-in (replaces local-only persistence).
    - Offline-first store: every capture/edit writes locally first (instant, works
      offline) and syncs to the server when a connection is available (last-write-wins).
    - aiExtract() is gone — the AI build calls the server's /api/assist/build, so the
      provider key never touches the browser.
    - margin/notes never reach the PDF (the server builds it) and aren't shown to clients.
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bidtranslator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#1F252C;--ink-soft:#2A323B;--ink-card:#252D36;
    --kraft:#E7D8B6;--kraft-deep:#D9C599;--paper:#F3EEE3;
    --amber:#EE9B2E;--amber-deep:#CF7F18;
    --blueprint:#2E5C7E;--blueprint-deep:#1E4259;--rust:#A94E38;
    --ok:#3E7D5A;
    --line:rgba(243,238,227,.14);--line-ink:rgba(31,37,44,.16);
    --muted:#9AA3AE;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"IBM Plex Sans",system-ui,sans-serif;background:var(--ink);color:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.5}
  .mono{font-family:"IBM Plex Mono",monospace}
  .display{font-family:"Archivo",sans-serif;font-weight:800;letter-spacing:-.01em}
  input,select,textarea,button{font-family:inherit;font-size:1rem}
  button{cursor:pointer}
  .app{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

  .top{position:sticky;top:0;z-index:40;background:rgba(31,37,44,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .top-in{display:flex;align-items:center;justify-content:space-between;padding:12px 18px}
  .brand{display:flex;align-items:center;gap:9px;font-family:"Archivo";font-weight:800;font-size:1rem}
  .brand .mark{width:22px;height:22px;border-radius:4px;background:var(--amber);color:var(--ink);display:flex;align-items:center;justify-content:center;font-family:"IBM Plex Mono";font-weight:600;font-size:.78rem}
  .brand b2{color:var(--amber)}
  .top-actions{display:flex;gap:6px;align-items:center}
  .icon-btn{background:transparent;border:1px solid var(--line);color:var(--paper);border-radius:6px;padding:7px 12px;font-family:"IBM Plex Mono";font-size:.74rem;letter-spacing:.03em}
  .icon-btn:hover{border-color:var(--amber);color:var(--amber)}
  .icon-btn.active{background:var(--amber);color:var(--ink);border-color:var(--amber)}

  /* sync + offline status */
  .sync{display:inline-flex;align-items:center;gap:6px;font-family:"IBM Plex Mono";font-size:.66rem;letter-spacing:.04em;color:var(--muted);padding:5px 9px;border:1px solid var(--line);border-radius:6px}
  .sync .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .sync.online .dot{background:var(--ok)}
  .sync.offline .dot{background:var(--amber-deep)}
  .sync.saving .dot{background:var(--blueprint);animation:pulse 1s infinite}
  .offline-banner{background:rgba(207,127,24,.16);border-bottom:1px solid var(--amber-deep);color:#f0d8af;font-family:"IBM Plex Mono";font-size:.74rem;text-align:center;padding:7px 12px}
  .trial-chip{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-family:"IBM Plex Mono";font-size:.66rem;letter-spacing:.04em;color:var(--ink);background:var(--amber);border:none;border-radius:6px;padding:6px 10px;font-weight:600}
  .trial-chip.warn{background:var(--rust);color:#fff}
  /* Keep the top bar on one tidy line on phones. */
  @media (max-width:480px){
    .top-in{padding:10px 13px}
    .brand{font-size:.92rem;gap:7px;min-width:0;flex-shrink:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .brand .mark{width:20px;height:20px;flex-shrink:0}
    .top-actions{gap:5px;flex-shrink:0}
    .sync{display:none}
    .icon-btn{padding:6px 10px;font-size:.72rem}
    .trial-chip{font-size:.62rem;padding:5px 8px}
  }

  /* billing / paywall */
  .pricecard{background:var(--ink-card);border:1px solid var(--line);border-radius:12px;padding:24px;margin-top:18px;text-align:center}
  .pricecard .amt{font-family:"Archivo";font-weight:900;font-size:2.6rem;letter-spacing:-.02em;margin:6px 0}
  .pricecard .amt span{font-family:"IBM Plex Mono";font-size:.9rem;font-weight:500;color:var(--muted)}
  .feat{list-style:none;text-align:left;max-width:340px;margin:16px auto;display:flex;flex-direction:column;gap:9px}
  .feat li{font-size:.92rem;padding-left:24px;position:relative}
  .feat li::before{content:"\2713";position:absolute;left:0;color:var(--ok);font-weight:700}
  .pricecard.soon{position:relative;border-style:dashed;opacity:.96;margin-top:14px}
  .pricecard.soon .amt{font-size:2.1rem;color:var(--muted)}
  .soonflag{position:absolute;top:14px;right:14px;font-family:"IBM Plex Mono";font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;background:var(--blueprint-deep);color:#cfe3f0;padding:4px 9px;border-radius:20px}
  .billbox{background:var(--ink-card);border:1px solid var(--line);border-radius:9px;padding:16px;margin-top:18px}
  .billbox h3{font-family:"IBM Plex Mono";font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
  .statline{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .badge{font-family:"IBM Plex Mono";font-size:.7rem;padding:3px 9px;border-radius:4px}
  .badge.active{background:rgba(62,125,90,.2);color:#8fd0a8}
  .badge.trial{background:rgba(207,127,24,.2);color:#f0d8af}
  .badge.none{background:rgba(154,163,174,.15);color:var(--muted)}
  .badge.past_due,.badge.canceled{background:rgba(169,78,56,.2);color:#e3a08f}
  .paybox{background:var(--ink-card);border:1px solid var(--line);border-radius:9px;padding:16px;margin-top:18px}
  .paybox h3{font-family:"IBM Plex Mono";font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
  .paylist{margin-top:14px;border-top:1px solid var(--line);padding-top:6px}
  .payrow{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;padding:9px 0;border-bottom:1px solid var(--line)}
  .payrow .payamt{font-family:"IBM Plex Mono";font-weight:600;color:var(--paper);margin-bottom:4px}
  .payact{display:flex;gap:8px;flex-wrap:wrap}

  main{flex:1;padding:18px}

  .btn{background:var(--amber);color:var(--ink);border:none;border-radius:6px;padding:13px 18px;font-family:"IBM Plex Mono";font-weight:600;font-size:.9rem;transition:transform .12s,background .12s}
  .btn:hover{background:#FFB347;transform:translateY(-1px)}
  .btn:disabled{opacity:.5;cursor:default;transform:none}
  .btn.ghost{background:transparent;color:var(--paper);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--amber);color:var(--amber);background:transparent}
  .btn.blue{background:var(--blueprint);color:#fff}
  .btn.blue:hover{background:#3a6e95}
  .btn.full{width:100%;display:block}
  .btn.sm{padding:8px 12px;font-size:.78rem}

  .h-eyebrow{font-family:"IBM Plex Mono";font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--amber)}
  h1.page{font-family:"Archivo";font-weight:900;font-size:1.7rem;margin:6px 0 4px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:.92rem}

  .newbar{display:flex;justify-content:space-between;align-items:center;margin:18px 0 14px;gap:12px;flex-wrap:wrap}
  .joblist{display:flex;flex-direction:column;gap:10px}
  .jobcard{background:var(--ink-card);border:1px solid var(--line);border-radius:9px;padding:15px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;text-align:left;width:100%;color:var(--paper)}
  .jobcard:hover{border-color:var(--amber)}
  .jobcard .jt{font-family:"Archivo";font-weight:700;font-size:1.02rem}
  .jobcard .jm{font-family:"IBM Plex Mono";font-size:.72rem;color:var(--muted);margin-top:3px}
  .jobcard .chev{color:var(--amber);font-family:"IBM Plex Mono"}
  .langtag{display:inline-block;font-family:"IBM Plex Mono";font-size:.62rem;letter-spacing:.06em;background:var(--blueprint-deep);color:#cfe3f0;padding:2px 7px;border-radius:3px;margin-left:6px}
  .pendtag{display:inline-block;font-family:"IBM Plex Mono";font-size:.62rem;letter-spacing:.06em;background:rgba(207,127,24,.2);color:#f0d8af;padding:2px 7px;border-radius:3px;margin-left:6px}
  /* Pipeline: filter chips + status badges + stage selector */
  .fchips{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 14px}
  .fchip{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:20px;padding:6px 11px;font-family:"IBM Plex Mono";font-size:.72rem;display:inline-flex;align-items:center;gap:6px}
  .fchip.on{background:var(--amber);color:var(--ink);border-color:var(--amber)}
  .fchip .fc{font-weight:700;opacity:.85}
  .sbadge{font-family:"IBM Plex Mono";font-size:.6rem;letter-spacing:.05em;text-transform:uppercase;padding:4px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0}
  .sbadge.draft{background:rgba(154,163,174,.15);color:var(--muted)}
  .sbadge.sent{background:rgba(207,127,24,.2);color:#f0d8af}
  .sbadge.signed{background:rgba(62,125,90,.22);color:#8fd0a8}
  .sbadge.scheduled{background:rgba(30,66,89,.45);color:#9fc2da}
  .stagebar{display:flex;gap:5px;margin:12px 0 2px;background:var(--ink-soft);padding:5px;border-radius:9px;border:1px solid var(--line);flex-wrap:wrap}
  .stbtn{flex:1;min-width:64px;background:transparent;border:none;color:var(--muted);padding:8px 6px;border-radius:6px;font-family:"IBM Plex Mono";font-size:.7rem;letter-spacing:.03em}
  .stbtn.on{background:var(--blueprint-deep);color:#cfe3f0;font-weight:600}
  .schedrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:10px 0 2px;background:var(--ink-soft);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
  .schedlbl{font-family:"IBM Plex Mono";font-size:.74rem;color:#9fc2da}
  .schedinput{background:var(--ink-card);border:1px solid var(--line);color:var(--paper);border-radius:6px;padding:8px 10px;font-size:.9rem;color-scheme:dark}
  .schedwarn{margin:8px 0 2px;background:rgba(196,90,52,.16);border:1px solid var(--rust);border-radius:8px;padding:9px 12px;font-family:"IBM Plex Mono";font-size:.72rem;color:#ffb59a;line-height:1.4}
  .datetag{display:inline-block;font-family:"IBM Plex Mono";font-size:.62rem;letter-spacing:.04em;background:rgba(30,66,89,.45);color:#9fc2da;padding:2px 7px;border-radius:3px;margin-left:6px}
  .addrrow{margin:10px 0 2px}
  .addrinput{width:100%;background:var(--ink-soft);border:1px solid var(--line);color:var(--paper);border-radius:8px;padding:10px 12px;font-size:.92rem}
  .addrlinks{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .maplink{font-family:"IBM Plex Mono";font-size:.72rem;text-decoration:none;background:var(--blueprint-deep);color:#cfe3f0;padding:7px 11px;border-radius:6px;border:1px solid var(--line)}
  .routecard{display:flex;align-items:stretch;gap:8px;margin-bottom:10px}
  .routecard .routemain{flex:1;background:var(--ink-card);border:1px solid var(--line);border-radius:9px;padding:14px 15px;text-align:left;color:var(--paper)}
  .routecard .routemain .jt{font-family:"Archivo";font-weight:700;font-size:1rem}
  .routecard .routemain .jm{font-family:"IBM Plex Mono";font-size:.72rem;color:var(--muted);margin-top:3px}
  .routedir{display:flex;align-items:center;justify-content:center;min-width:54px;font-size:1.1rem;text-decoration:none}
  /* ===== Dashboard ===== */
  .dash-hello{margin:6px 0 14px}
  .kpis{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 4px 8px;margin:0 -4px 12px;scrollbar-width:none}
  .kpis::-webkit-scrollbar{display:none}
  .kpi{flex:0 0 auto;min-width:130px;background:var(--ink-card);border:1px solid var(--line);border-radius:12px;padding:13px 14px}
  .kpi-ic{font-size:1.05rem}
  .kpi-l{font-family:"IBM Plex Mono";font-size:.6rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .kpi-v{font-family:"Archivo";font-weight:900;font-size:1.5rem;letter-spacing:-.02em;margin-top:2px}
  .kpi-s{font-family:"IBM Plex Mono";font-size:.58rem;color:var(--muted);margin-top:2px}
  .kpi.rev{border-color:rgba(62,125,90,.5)} .kpi.rev .kpi-v{color:#8fd0a8}
  .kpi.pend .kpi-v{color:#f0d8af}
  .kpi.close .kpi-v{color:var(--amber)}
  .kpi.foll.alert{border-color:var(--rust)} .kpi.foll.alert .kpi-v{color:#ff9b7a}
  .panel{background:var(--ink-card);border:1px solid var(--line);border-radius:12px;padding:8px;margin-bottom:14px}
  .panel-h{width:100%;display:flex;justify-content:space-between;align-items:center;background:transparent;border:none;color:var(--paper);font-family:"IBM Plex Mono";font-size:.78rem;padding:8px}
  .panel-h.static{cursor:default}
  .panel-link{color:var(--amber);font-size:.72rem}
  .sch-item{display:flex;gap:8px;align-items:stretch;padding:0 2px}
  .sch-main{flex:1;background:var(--ink-soft);border:1px solid var(--line);border-radius:8px;padding:10px 12px;text-align:left;color:var(--paper);margin-bottom:6px;min-width:0}
  .sch-t{font-family:"Archivo";font-weight:700;font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sch-s{font-family:"IBM Plex Mono";font-size:.68rem;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sch-dir{display:flex;align-items:center;justify-content:center;min-width:46px;margin-bottom:6px;background:var(--blueprint-deep);border:1px solid var(--line);border-radius:8px;text-decoration:none;font-size:1.05rem}
  .act-item{width:100%;text-align:left;background:transparent;border:none;border-top:1px solid var(--line);color:var(--paper);padding:9px 8px}
  .act-t{font-family:"Archivo";font-weight:600;font-size:.9rem}
  .act-s{font-family:"IBM Plex Mono";font-size:.66rem;color:var(--muted);margin-top:2px}
  .jcard{display:flex;align-items:stretch;gap:8px;margin-bottom:10px}
  .jcard-main{flex:1;display:flex;gap:12px;background:var(--ink-card);border:1px solid var(--line);border-radius:11px;padding:12px;text-align:left;color:var(--paper);min-width:0}
  .jcard-photo{flex:0 0 64px;width:64px;height:64px;border-radius:8px;background-size:cover;background-position:center;background-color:var(--ink-soft)}
  .jcard-photo.noimg{display:flex;align-items:center;justify-content:center;font-size:1.5rem;opacity:.45}
  .jcard-info{flex:1;min-width:0}
  .jcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .jcard-top .jt{font-family:"Archivo";font-weight:700;font-size:1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .jcard-val{font-family:"Archivo";font-weight:900;font-size:1.15rem;color:#8fd0a8;margin:2px 0}
  .jcard-meta{font-family:"IBM Plex Mono";font-size:.68rem;color:#cfe3f0;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .jcard-meta.dim,.jcard-meta .dim{color:var(--muted)}
  .jcard-actions{display:flex;flex-direction:column;gap:6px;justify-content:center}
  .qa{display:flex;align-items:center;justify-content:center;width:42px;flex:1;min-height:30px;background:var(--ink-soft);border:1px solid var(--line);border-radius:8px;color:var(--paper);text-decoration:none;font-size:1rem}
  .weekgrid{display:flex;flex-direction:column;gap:10px;margin-top:12px}
  .wk-day{background:var(--ink-card);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
  .wk-day.today{border-color:var(--amber)}
  .wk-h{font-family:"IBM Plex Mono";font-size:.72rem;letter-spacing:.04em;color:var(--amber);margin-bottom:8px}
  .wk-empty{font-family:"IBM Plex Mono";font-size:.7rem;color:var(--muted);padding:2px}
  .frow{position:relative;display:flex;align-items:center;gap:8px;padding:9px 8px;border-top:1px solid var(--line)}
  .fbar{position:absolute;left:0;top:0;bottom:0;background:rgba(207,127,24,.16);border-right:2px solid var(--amber);border-radius:0 6px 6px 0;z-index:0}
  .flabel{position:relative;z-index:1;flex:1;font-family:"IBM Plex Mono";font-size:.78rem;color:var(--paper)}
  .fval{position:relative;z-index:1;font-family:"Archivo";font-weight:800;font-size:1rem}
  .fdrop{font-family:"IBM Plex Mono";font-size:.64rem;color:#ff9b7a;font-weight:400}
  .subpill{font-family:"IBM Plex Mono";font-size:.56rem;background:rgba(62,125,90,.22);color:#8fd0a8;padding:2px 6px;border-radius:4px;margin-left:4px;text-transform:uppercase}
  @media(min-width:720px){ .kpi{flex:1 1 0} }
  .empty{text-align:center;padding:54px 20px;border:1px dashed var(--line);border-radius:10px}
  .empty .big{font-family:"Archivo";font-weight:800;font-size:1.2rem;margin-bottom:6px}

  label.fld{display:block;margin:16px 0 6px;font-family:"IBM Plex Mono";font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .input,textarea.input,select.input{width:100%;background:var(--ink-soft);border:1px solid var(--line);color:var(--paper);border-radius:7px;padding:12px 13px}
  .input:focus,textarea.input:focus,select.input:focus{outline:2px solid var(--amber);outline-offset:1px;border-color:transparent}
  textarea.input{min-height:150px;resize:vertical;line-height:1.55}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row2 label.fld{margin-top:16px}

  .nb-sec{background:var(--ink-card);border:1px solid var(--line);border-radius:9px;padding:16px;margin-bottom:12px}
  .nb-sec h3{font-family:"IBM Plex Mono";font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
  .nb-sec p{font-size:.95rem}
  .nb-sec .quote{font-style:italic;color:#cdc7bb}
  .nb-list{list-style:none;display:flex;flex-direction:column;gap:7px}
  .nb-list li{font-size:.92rem;padding-left:16px;position:relative}
  .nb-list li::before{content:"–";position:absolute;left:0;color:var(--blueprint)}
  .nb-list.excl li::before{content:"\2717";color:var(--rust)}
  .nb-list.up li::before{content:"+";color:var(--amber)}
  .editarea{width:100%;background:var(--ink-soft);border:1px solid var(--line);color:var(--paper);border-radius:7px;padding:10px 12px;line-height:1.55;min-height:70px;resize:vertical;margin-top:4px}
  .machine-tag{display:inline-block;font-family:"IBM Plex Mono";font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--blueprint);border:1px solid var(--blueprint);border-radius:3px;padding:1px 6px;margin-left:8px;vertical-align:middle}

  .line{background:var(--ink-card);border:1px solid var(--line);border-radius:9px;padding:13px;margin-bottom:10px}
  .line .ltop{display:flex;gap:8px;align-items:flex-start}
  .line .ldesc{flex:1;background:var(--ink-soft);border:1px solid var(--line);color:var(--paper);border-radius:6px;padding:9px 10px;font-size:.92rem}
  .line .del{background:transparent;border:none;color:var(--muted);font-size:1.1rem;padding:4px 8px}
  .line .del:hover{color:var(--rust)}
  .line .lroom{margin-top:9px}
  .line .lroom input{width:100%;background:var(--ink-soft);border:1px solid var(--line);color:var(--paper);border-radius:6px;padding:7px 9px;font-family:"IBM Plex Mono";font-size:.74rem}
  .secgroup{margin-bottom:14px}
  .sechead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:6px 0 8px;font-family:"IBM Plex Mono";font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--amber)}
  .sechead .secsub{color:var(--paper);font-weight:600}
  .csec{margin-bottom:8px}
  .csec-h{font-family:"IBM Plex Mono";font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--blueprint-deep,#1E4259);margin:14px 0 4px;font-weight:700}
  .cline.csub{border-bottom:none}
  .cline.csub .cd{color:#8a7f68;font-style:italic}
  .cline.csub .ca{color:#5a5240}
  .line .lctl{display:grid;grid-template-columns:auto 1fr 1fr auto;gap:8px;align-items:center;margin-top:9px}
  .line select.mini,.line input.mini{background:var(--ink-soft);border:1px solid var(--line);color:var(--paper);border-radius:6px;padding:8px 9px;font-family:"IBM Plex Mono";font-size:.8rem;width:100%}
  .line .lt-amt{text-align:right;font-family:"IBM Plex Mono";font-weight:600;color:var(--amber);white-space:nowrap;font-size:.9rem}
  .furn{display:flex;gap:6px;margin-top:9px}

<body>
<div class="app">
  <div class="top" id="topbar" style="display:none">

  <main id="view"></main>
</div>
<div id="printArea"></div>

<script>
/* ============ config / state ============ */
const API = '';
const LANGS = {
  en:'English', es:'Español', zh:'中文', hi:'हिन्दी', ar:'العربية', bn:'বাংলা',
  pt:'Português', ru:'Русский', ja:'日本語', pa:'ਪੰਜਾਬੀ', de:'Deutsch', ko:'한국어',
  fr:'Français', te:'తెలుగు', mr:'मराठी', ta:'தமிழ்', tr:'Türkçe', vi:'Tiếng Việt',
  ur:'اردو', it:'Italiano', gu:'ગુજરાતી', pl:'Polski', uk:'Українська', fa:'فارسی',
  kn:'ಕನ್ನಡ', ml:'മലയാളം', th:'ไทย', nl:'Nederlands', id:'Bahasa Indonesia',
  ms:'Bahasa Melayu', tl:'Filipino', sw:'Kiswahili', ro:'Română', el:'Ελληνικά',
  cs:'Čeština', hu:'Magyar', sv:'Svenska', he:'עברית', da:'Dansk', fi:'Suomi',
  no:'Norsk', sk:'Slovenčina', hr:'Hrvatski', sr:'Српски', bg:'Български',
  lt:'Lietuvių', sl:'Slovenščina', lv:'Latviešu', et:'Eesti', af:'Afrikaans',
  sq:'Shqip', am:'አማርኛ', hy:'Հայերեն', az:'Azərbaycanca', ka:'ქართული',
  kk:'Қазақша', ne:'नेपाली', si:'සිංහල', km:'ខ្មែរ', lo:'ລາວ', my:'မြန်မာ',
  mn:'Монгол', is:'Íslenska', ga:'Gaeilge', cy:'Cymraeg', eu:'Euskara',
  gl:'Galego', ca:'Català', ps:'پښتو', so:'Soomaali', ha:'Hausa', yo:'Yorùbá',
  ig:'Igbo', zu:'isiZulu', xh:'isiXhosa'
};
const SPEECH_LANG={
  en:'en-US', es:'es-ES', zh:'zh-CN', hi:'hi-IN', ar:'ar-SA', bn:'bn-BD',
  pt:'pt-BR', ru:'ru-RU', ja:'ja-JP', pa:'pa-IN', de:'de-DE', ko:'ko-KR',
  fr:'fr-FR', te:'te-IN', mr:'mr-IN', ta:'ta-IN', tr:'tr-TR', vi:'vi-VN',
  ur:'ur-PK', it:'it-IT', gu:'gu-IN', pl:'pl-PL', uk:'uk-UA', fa:'fa-IR',
  kn:'kn-IN', ml:'ml-IN', th:'th-TH', nl:'nl-NL', id:'id-ID', ms:'ms-MY',
  tl:'fil-PH', sw:'sw-KE', ro:'ro-RO', el:'el-GR', cs:'cs-CZ', hu:'hu-HU',
  sv:'sv-SE', he:'he-IL', da:'da-DK', fi:'fi-FI', no:'nb-NO', sk:'sk-SK',
  hr:'hr-HR', sr:'sr-RS', bg:'bg-BG', lt:'lt-LT', sl:'sl-SI', lv:'lv-LV',
  et:'et-EE', af:'af-ZA', sq:'sq-AL', am:'am-ET', hy:'hy-AM', az:'az-AZ',
  ka:'ka-GE', kk:'kk-KZ', ne:'ne-NP', si:'si-LK', km:'km-KH', lo:'lo-LA',
  my:'my-MM', mn:'mn-MN', is:'is-IS', ga:'ga-IE', cy:'cy-GB', eu:'eu-ES',
  gl:'gl-ES', ca:'ca-ES', ps:'ps-AF', so:'so-SO', ha:'ha-NG', yo:'yo-NG',
  ig:'ig-NG', zu:'zu-ZA', xh:'xh-ZA'
};
const uid = () => Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4);
const money = n => '$' + (Math.round((+n||0))).toLocaleString('en-US');

const state = { view:'home', jobId:null, bidTab:'notebook', loading:false, error:'', authMode:'signin', authError:'', booted:false };
let TOKEN = localStorage.getItem('bt_token') || null;
let USER = JSON.parse(localStorage.getItem('bt_user')||'null');
let SETTINGS = JSON.parse(localStorage.getItem('bt_settings')||'null') || { company:'Your Company', name:'', phone:'', license:'', from:'es', to:'en', logo:'' };
let JOBS = JSON.parse(localStorage.getItem('bt_jobs')||'[]');
let CAP_PHOTOS = []; // photos staged on the capture screen before the job exists
let settingsDirty = false;
let online = navigator.onLine;
let syncing = false;
let BILLING = JSON.parse(localStorage.getItem('bt_billing')||'null'); // {configured,entitled,status,in_trial,trial_ends_at,...}
let ADMIN = false; // founder dashboard access (server decides via BT_ADMIN_EMAIL)

/* ============ analytics ============ */
// Fire-and-forget client event; analytics must never block or break the UI.
function track(ev, props){ if(!TOKEN || !online || !ev) return; try{ api('/api/track',{method:'POST',body:JSON.stringify({event:ev,props:props||{}})}).catch(()=>{}); }catch(e){} }
async function loadMe(){ if(!TOKEN || !online) return; try{ const r=await api('/api/me'); ADMIN=!!r.admin; }catch(e){} }

/* ============ billing ============ */
function entitled(){ return !BILLING || BILLING.entitled !== false; }
async function loadBilling(){
  if(!TOKEN || !online) return;
  try{ BILLING = await api('/api/billing/status'); localStorage.setItem('bt_billing', JSON.stringify(BILLING)); }catch(e){}
}
function trialDaysLeft(){
  if(!BILLING || !BILLING.trial_ends_at) return 0;
  return Math.max(0, Math.ceil((BILLING.trial_ends_at - Date.now())/86400000));
}
async function startCheckout(btn){
  const label = btn ? btn.textContent : '';
  if(btn){ btn.disabled=true; btn.textContent='Opening checkout…'; }
  try{ const r=await api('/api/billing/checkout',{method:'POST'}); window.location.href=r.url; }
  catch(e){ if(btn){ btn.disabled=false; btn.textContent=label||'Subscribe'; } if(!gate402(e)) alert(e.message||'Could not start checkout.'); }
}
async function openPortal(btn){
  if(btn){ btn.disabled=true; btn.textContent='Opening…'; }
  try{ const r=await api('/api/billing/portal',{method:'POST'}); window.location.href=r.url; }
  catch(e){ if(btn){ btn.disabled=false; btn.textContent='Manage billing'; } alert(e.message||'Could not open billing.'); }
}
// Route gated 402s to the paywall.
function gate402(e){ if(e && e.status===402){ loadBilling().then(()=>go('paywall')); return true; } return false; }

/* ============ payments (get paid via Stripe Connect) ============ */
let PAYMENTS = JSON.parse(localStorage.getItem('bt_payments')||'null'); // {configured,connected,charges_enabled}
let PAYREQS = {}; // jobId -> [requests]
async function loadPayments(){
  if(!TOKEN || !online) return;
  try{ PAYMENTS = await api('/api/payments/status'); localStorage.setItem('bt_payments', JSON.stringify(PAYMENTS)); }catch(e){}
}
async function refreshPayments(){
  if(!TOKEN || !online) return;
  try{ PAYMENTS = await api('/api/payments/refresh',{method:'POST'}); localStorage.setItem('bt_payments', JSON.stringify(PAYMENTS)); }catch(e){}
}
function paymentsReady(){ return !!(PAYMENTS && PAYMENTS.configured && PAYMENTS.charges_enabled); }
async function startConnect(btn){
  if(btn){ btn.disabled=true; btn.textContent='Opening…'; }
  try{ const r=await api('/api/payments/connect',{method:'POST'}); window.location.href=r.url; }
  catch(e){ if(btn){ btn.disabled=false; btn.textContent='Set up payments'; } if(!gate402(e)) alert(e.message||'Could not start payment setup.'); }
}
async function loadJobPayReqs(jobId){
  if(!TOKEN || !online) return;
  try{ const r=await api('/api/payments/requests?job_id='+encodeURIComponent(jobId)); PAYREQS[jobId]=r.requests||[]; if(state.view==='job') render(); }catch(e){}
}
async function createPayReq(jobId, btn){
  const amtEl=document.getElementById('prAmt'), nameEl=document.getElementById('prName');
  const amount=+(amtEl&&amtEl.value)||0;
  const clientName=(nameEl&&nameEl.value||'').trim();
  if(amount<1){ alert('Enter an amount of at least $1.'); return; }
  const j=JOBS.find(x=>x.id===jobId);
  if(btn){ btn.disabled=true; btn.textContent='Creating link…'; }
  try{
    const r=await api('/api/payments/requests',{method:'POST', body:JSON.stringify({ amount, clientName, jobId, description:(j&&j.title)||'Construction work' })});
    PAYREQS[jobId]=[r.request, ...(PAYREQS[jobId]||[])];
    render();
  }catch(e){ if(btn){ btn.disabled=false; btn.textContent='Create payment link'; } if(!gate402(e)) alert(e.message||'Could not create the payment link.'); }
}
async function cancelPayReq(jobId, id){
  if(!confirm('Cancel this payment request?')) return;
  try{ const r=await api('/api/payments/requests/'+id+'/cancel',{method:'POST'});
    PAYREQS[jobId]=(PAYREQS[jobId]||[]).map(x=>x.id===id?r.request:x); render();
  }catch(e){ alert(e.message||'Could not cancel.'); }
}
async function copyPayLink(url, btn){
  try{ await navigator.clipboard.writeText(url); if(btn){ const t=btn.textContent; btn.textContent='Copied ✓'; setTimeout(()=>btn.textContent=t,1500); } }
  catch(e){ prompt('Copy this payment link:', url); }
}

/* ============ local persistence ============ */
function persist(){ localStorage.setItem('bt_jobs', JSON.stringify(JOBS)); }
function persistSettings(){ localStorage.setItem('bt_settings', JSON.stringify(SETTINGS)); }
function persistAuth(){
  if(TOKEN) localStorage.setItem('bt_token', TOKEN); else localStorage.removeItem('bt_token');
  if(USER) localStorage.setItem('bt_user', JSON.stringify(USER)); else localStorage.removeItem('bt_user');
}
function touch(job){ job.updated_at = Date.now(); job._dirty = true; }
let saveT;
function saveJobs(){ persist(); clearTimeout(saveT); saveT=setTimeout(()=>syncNow(), 600); }

/* ============ API helper ============ */
async function api(path, opts={}){
  const headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if(TOKEN) headers['Authorization'] = 'Bearer '+TOKEN;
  const res = await fetch(API+path, Object.assign({}, opts, { headers }));
  let body=null; try{ body = await res.json(); }catch(e){}
  if(res.status===401){ // session gone — drop to auth, keep local data
    TOKEN=null; USER=null; persistAuth(); throw Object.assign(new Error((body&&body.error)||'Session expired'),{status:401});
  }
  if(!res.ok) throw Object.assign(new Error((body&&body.error)||('Error '+res.status)),{status:res.status, code:body&&body.code});
  return body;
}

/* ============ auth ============ */
async function doAuth(){
  const email=(document.getElementById('authEmail').value||'').trim();
  const pass=document.getElementById('authPass').value||'';
  state.authError='';
  const path = state.authMode==='signup' ? '/api/auth/signup' : '/api/auth/signin';
  try{
    const r = await api(path, { method:'POST', body:JSON.stringify({email, password:pass}) });
    TOKEN=r.token; USER=r.user; persistAuth();
    if(r.user){ SETTINGS=Object.assign({}, SETTINGS, {
      company:r.user.company||SETTINGS.company, name:r.user.name||'', phone:r.user.phone||'',
      license:r.user.license||'', from:r.user.default_from_lang||'es', to:r.user.default_to_lang||'en',
      logo:(r.user.logo!==undefined?r.user.logo:SETTINGS.logo)||''
    }); persistSettings(); }
    state.view='home';
    render();
    await Promise.all([syncNow(true), loadBilling(), loadPayments(), loadMe()]);
    render();
  }catch(e){ state.authError = e.message || 'Could not sign in.'; render(); }
}
function setAuthMode(m){ state.authMode=m; state.authError=''; render(); }
async function signOut(){
  try{ if(TOKEN) await api('/api/auth/signout',{method:'POST'}); }catch(e){}
  TOKEN=null; USER=null; BILLING=null; PAYMENTS=null; PAYREQS={};
  localStorage.removeItem('bt_billing'); localStorage.removeItem('bt_payments'); persistAuth();
  state.view='home'; render();
}

/* ============ sync engine (offline-first, last-write-wins) ============ */
function setSync(s){ syncing=s; paintSync(); }
function paintSync(){
  const b=document.getElementById('syncBadge'); if(!b) return;
  const pending = JOBS.some(j=>j._dirty||j._deleted) || settingsDirty;
  b.classList.remove('online','offline','saving');
  let label;
  if(!online){ b.classList.add('offline'); label='Offline'; }
  else if(syncing){ b.classList.add('saving'); label='Syncing…'; }
  else if(pending){ b.classList.add('saving'); label='Pending'; }
  else { b.classList.add('online'); label='Synced'; }
  const l=b.querySelector('.lbl'); if(l) l.textContent=label;
  const banner=document.getElementById('offlineBanner'); if(banner) banner.style.display = online?'none':'block';
}

async function syncNow(force){
  if(!TOKEN || !online || syncing) { paintSync(); return; }
  setSync(true);
  try{
    // 1) push settings if changed
    if(settingsDirty){
      try{ await api('/api/me',{method:'PATCH', body:JSON.stringify({
        company:SETTINGS.company, name:SETTINGS.name, phone:SETTINGS.phone,
        license:SETTINGS.license, from:SETTINGS.from, to:SETTINGS.to, logo:SETTINGS.logo||'' })}); settingsDirty=false; }catch(e){}
    }
    // 2) pull server jobs
    let server=[];
    try{ server = (await api('/api/jobs')).jobs || []; }catch(e){ server=[]; }
    const serverById = new Map(server.map(j=>[j.id,j]));

    // 3) reconcile each local job
    for(const local of JOBS.slice()){
      if(local._deleted){
        try{ await api('/api/jobs/'+local.id,{method:'DELETE'}); }catch(e){ if(e.status!==404) continue; }
        JOBS = JOBS.filter(j=>j!==local); continue;
      }
      if(local._dirty){
        const payload = jobPayload(local);
        try{
          if(serverById.has(local.id)) await api('/api/jobs/'+local.id,{method:'PATCH', body:JSON.stringify(payload)});
          else await api('/api/jobs',{method:'POST', body:JSON.stringify(payload)});
          await uploadPendingPhotos(local);
          local._dirty=false;
        }catch(e){ /* leave dirty; retry next sync */ }
      } else if(serverById.has(local.id)){
        const s=serverById.get(local.id);
        if((s.updated_at||0) > (local.updated_at||0)) replaceJob(local.id, hydrate(s));
      }
    }
    // 4) add server jobs we don't have locally
    for(const s of server){
      if(!JOBS.find(j=>j.id===s.id)) JOBS.push(hydrate(s));
    }
    JOBS.sort((a,b)=>(b.updated_at||b.created||0)-(a.updated_at||a.created||0));
    persist();
  } finally {
    setSync(false);
    if(state.booted) render();
  }
}

function jobPayload(j){
  return { id:j.id, title:j.title, from:j.from, to:j.to, transcript:j.transcript, translation:j.translation,
    summary:j.summary, assumptions:j.assumptions, exclusions:j.exclusions, lines:j.lines, upgrades:j.upgrades,
    notes:j.notes, margin:j.margin, status:j.status, scheduled_date:j.scheduled_date||'', scheduled_time:j.scheduled_time||'', address:j.address||'', customer:j.customer||'', deposit_pct:(j.deposit_pct==null?25:j.deposit_pct), updated_at:j.updated_at, created_at:j.created };
}
function hydrate(s){
  return { id:s.id, title:s.title, created:s.created_at, updated_at:s.updated_at, from:s.from, to:s.to,
    transcript:s.transcript||'', translation:s.translation||'', summary:s.summary||'',
    assumptions:s.assumptions||[], exclusions:s.exclusions||[], lines:s.lines||[], upgrades:s.upgrades||[],
    notes:s.notes||'', margin:s.margin||0, status:s.status||'draft', scheduled_date:s.scheduled_date||'', scheduled_time:s.scheduled_time||'', address:s.address||'', customer:s.customer||'', deposit_pct:(s.deposit_pct==null?25:s.deposit_pct),
    photos:(s.photos||[]).map(p=>({id:p.id, url:p.url})), _dirty:false };
}
function replaceJob(id, fresh){
  const i=JOBS.findIndex(j=>j.id===id);
  // keep any locally-pending photos that haven't uploaded yet
  if(i>=0){ const pend=(JOBS[i].photos||[]).filter(p=>p._pending); fresh.photos=(fresh.photos||[]).concat(pend); JOBS[i]=fresh; }
}

async function uploadPendingPhotos(job){
  const pend=(job.photos||[]).filter(p=>p._pending);
  for(const p of pend){
    try{
      const r=await api('/api/jobs/'+job.id+'/photos',{method:'POST', body:JSON.stringify({dataUrl:p.dataUrl})});
      p.id=r.photo.id; p.url=r.photo.url; delete p.dataUrl; delete p._pending;
    }catch(e){ /* retry next sync */ }
  }
}

// Pull the full job (the list endpoint omits photo URLs). Refreshes signed photo
// links + server fields when the local copy isn't dirty. Fire-and-forget.
async function refreshJob(id){
  if(!online || !TOKEN) return;
  let r; try{ r = await api('/api/jobs/'+id); }catch(e){ return; }
  const s = r.job; const local = JOBS.find(j=>j.id===id); if(!local || !s) return;
  const pend = (local.photos||[]).filter(p=>p._pending);
  const serverPhotos = (s.photos||[]).map(p=>({id:p.id, url:p.url}));
  if(!local._dirty && (s.updated_at||0) >= (local.updated_at||0)){
    Object.assign(local, hydrate(s));
  }
  local.photos = serverPhotos.concat(pend);
  persist();
  if(state.view==='job' && state.jobId===id) render();
}

function timeAgo(ts){ if(!ts) return ''; const m=Math.floor((Date.now()-ts)/60000); if(m<1)return'just now'; if(m<60)return m+'m ago'; const h=Math.floor(m/60); if(h<24)return h+'h ago'; return Math.floor(h/24)+'d ago'; }

// KPI math straight from the jobs we already store. "Won" = signed + scheduled.
function dashKPIs(visible){
  const sum=(arr)=>arr.reduce((s,j)=>s+bidTotal(j),0);
  const won=visible.filter(j=>jobStatus(j)==='signed'||jobStatus(j)==='scheduled');
  const sent=visible.filter(j=>jobStatus(j)==='sent');
  const now=Date.now();
  const followups=sent.filter(j=>now-(j.sent_at||j.updated_at||now) > 3*86400000);
  const decided=won.length+sent.length;
  return { revenue:sum(won), wonCount:won.length, pending:sum(sent), pendingCount:sent.length,
    close: decided?Math.round(won.length/decided*100):0, followups:followups.length };
}
function kpiStrip(k){
  const card=(ic,label,val,sub,cls)=>`<div class="kpi ${cls||''}"><div class="kpi-ic">${ic}</div><div class="kpi-l">${label}</div><div class="kpi-v">${val}</div><div class="kpi-s">${sub||''}</div></div>`;
  return `<div class="kpis">`
    + card('💰','Revenue',money(k.revenue),k.wonCount+' won','rev')
    + card('⏳','Pending',money(k.pending),k.pendingCount+' out','pend')
    + card('✅','Jobs won',k.wonCount,'closed','won')
    + card('🎯','Close rate',k.close+'%','of bids','close')
    + card('🔔','Follow-ups',k.followups,k.followups?'need attention':'all clear', k.followups?'foll alert':'foll')
    + `</div>`;

  let filtered = f==='all' ? visible : visible.filter(j=>jobStatus(j)===f);
  if(f==='scheduled'){ filtered=[...filtered].sort((a,b)=>String(a.scheduled_date||'9999-99-99').localeCompare(String(b.scheduled_date||'9999-99-99'))); }
  let list;
  if(filtered.length===0){ list = `<div class="hint" style="margin-top:16px">No ${statusLabel(f).toLowerCase()} jobs yet.</div>`; }
  else { list = (f==='scheduled'?`<div class="hint" style="margin:2px 0 12px">🗺️ Tap 🧭 for directions to each stop.</div>`:'') + '<div class="joblist">' + filtered.map(jobCardHTML).join('') + '</div>'; }
  return `${hello}

    <div class="fchips">${chips}</div>${list}

}

// Weekly calendar — the Schedule view. Standalone (a Google Calendar sync would
// need OAuth and is on the roadmap).
function viewSchedule(){
  const visible = JOBS.filter(j=>!j._deleted && jobStatus(j)==='scheduled' && j.scheduled_date);
  const base=new Date(); base.setHours(0,0,0,0);
  const iso=(d)=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const todayK=iso(base);
  const byDate={}; visible.forEach(j=>{ (byDate[j.scheduled_date]=byDate[j.scheduled_date]||[]).push(j); });
  const days=[]; for(let i=0;i<7;i++){ const d=new Date(base); d.setDate(base.getDate()+i); days.push(d); }
  const item=(j)=>{ const loc=jobLocation(j); const m=loc?mapsLinks(loc):null; const ea=(j.address||'').trim();
    return `<div class="sch-item"><button class="sch-main" onclick="go('job','${j.id}')">
      <div class="sch-t">${esc(j.title)||'Untitled'}</div>
      <div class="sch-s">${j.scheduled_time?`<b style="color:var(--amber)">${fmtTime(j.scheduled_time)}</b> · `:''}${ea?esc(ea)+' · ':''}${money(bidTotal(j))}</div></button>
      ${m?`<a class="sch-dir" href="${m.dir}" target="_blank" rel="noopener" title="Directions">🧭</a>`:''}<a class="sch-dir" href="${calLink(j)}" target="_blank" rel="noopener" title="Add to Calendar">📲</a></div>`; };
  const dayBlocks=days.map(d=>{
    const k=iso(d); const jobs=(byDate[k]||[]).sort(byTime);
    const lbl=d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    return `<div class="wk-day ${k===todayK?'today':''}"><div class="wk-h">${k===todayK?'Today · ':''}${lbl}${jobs.length?` · ${jobs.length} ${jobs.length===1?'job':'jobs'}${jobs.length>1?' ⚠️':''}`:''}</div>${jobs.length?jobs.map(item).join(''):'<div class="wk-empty">—</div>'}</div>`;
  }).join('');
  const later=visible.filter(j=>j.scheduled_date>iso(days[6])).sort((a,b)=>a.scheduled_date.localeCompare(b.scheduled_date));
  const laterBlock=later.length?`<div class="wk-day"><div class="wk-h">Later</div>${later.map(item).join('')}</div>`:'';
  return `<div class="h-eyebrow">Schedule</div><h1 class="page">This week</h1>
    <div class="sub">Your scheduled jobs &amp; estimates — tap 🧭 for directions.</div>
    <div class="weekgrid">${dayBlocks}${laterBlock}</div>`;
}
function setJobFilter(f){ state.jobFilter=f; render(); }
function setJobStatus(id,s){
  const j=JOBS.find(x=>x.id===id); if(!j) return;
  j.status=s; if(s!=='draft' && !j.sent_at) j.sent_at=Date.now();
  touch(j); saveJobs(); render();
}
function setSchedule(id,v){
  const j=JOBS.find(x=>x.id===id); if(!j) return;
  j.scheduled_date=v||''; touch(j); saveJobs(); render();
}
function setScheduleTime(id,v){ const j=JOBS.find(x=>x.id===id); if(!j) return; j.scheduled_time=v||''; touch(j); saveJobs(); render(); }
function fmtTime(t){ if(!t) return ''; const p=String(t).split(':'); if(p.length<2) return t; let h=+p[0]; const ap=h<12?'AM':'PM'; h=h%12||12; return h+':'+p[1]+' '+ap; }
const byTime=(a,b)=>String(a.scheduled_time||'99:99').localeCompare(String(b.scheduled_time||'99:99'));
// Double-booking guard: other scheduled jobs that share this job's date.
function jobsOnDate(date, excludeId){
  if(!date) return [];
  return JOBS.filter(x=>!x._deleted && x.id!==excludeId && jobStatus(x)==='scheduled' && x.scheduled_date===date);
}
function conflictNote(j){
  const others=jobsOnDate(j.scheduled_date, j.id);
  if(!others.length) return '';
  return `<div class="schedwarn">⚠️ Heads up — ${others.length} other ${others.length===1?'job':'jobs'} already on ${fmtDate(j.scheduled_date)}: ${others.map(o=>(o.scheduled_time?fmtTime(o.scheduled_time)+' ':'')+(esc(o.title)||'Untitled')).join(' · ')}</div>`;
}
function fmtDate(d){
  if(!d) return ''; const p=String(d).split('-'); if(p.length!==3) return d;
  return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
// Google Maps deep-links built from a plain address string — no API key, no cost.
function mapsLinks(addr){
  const q=encodeURIComponent((addr||'').trim());
  return {
    map:`https://www.google.com/maps/search/?api=1&query=${q}`,
    dir:`https://www.google.com/maps/dir/?api=1&destination=${q}`,
    sv:`https://www.google.com/maps?q=${q}&layer=c`
  };
}
function setAddress(id,v){ const j=JOBS.find(x=>x.id===id); if(!j) return; j.address=v||''; touch(j); saveJobs(); render(); }
function setCustomer(id,v){ const j=JOBS.find(x=>x.id===id); if(!j) return; j.customer=v||''; touch(j); saveJobs(); }
// One source of truth for a job's location: the explicit address field, or — so
// you never type it twice — the project name itself when that looks like an
// address (has a number). Drives every map, directions & calendar link.
function looksLikeAddress(t){ t=(t||'').trim(); return /\d/.test(t) && t.length>4; }
function jobLocation(j){ const a=(j&&j.address||'').trim(); if(a) return a; const t=(j&&j.title||'').trim(); return looksLikeAddress(t)?t:''; }
// "Add to Calendar" — opens a pre-filled Google Calendar event (all-day on the
// scheduled date). One tap → it's on the contractor's REAL calendar, with
// reminders. No API key, no OAuth (same spirit as the maps deep-links).
function calLink(j){
  if(!j || !j.scheduled_date) return '';
  const p=j.scheduled_date.split('-'); if(p.length!==3) return '';
  const pad=(n)=>String(n).padStart(2,'0');
  let dates;
  if(j.scheduled_time && /^\d{1,2}:\d{2}$/.test(j.scheduled_time)){
    const [hh,mm]=j.scheduled_time.split(':').map(Number);
    const s=new Date(+p[0],+p[1]-1,+p[2],hh,mm), e=new Date(s.getTime()+2*3600000);
    const f=(d)=>d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(d.getHours())+pad(d.getMinutes())+'00';
    dates=f(s)+'/'+f(e);
  } else {
    const d=new Date(+p[0],+p[1]-1,+p[2]); d.setDate(d.getDate()+1);
    dates=p[0]+p[1]+p[2]+'/'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());
  }
  const note=(j.notes||'').trim();
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+encodeURIComponent((j.title||'Job')+' — '+(SETTINGS.company||'Bidtranslator'))
    +'&dates='+dates
    +(jobLocation(j)?'&location='+encodeURIComponent(jobLocation(j)):'')
    +'&details='+encodeURIComponent('Scheduled via Bidtranslator · '+money(bidTotal(j))+(note?'\n\nNotes: '+note:''));
}
function addrBlock(j){
  const loc=jobLocation(j);
  const usingTitle = !(j.address||'').trim() && loc;
  const input=`<input class="addrinput" value="${escAttr(j.address||'')}" onchange="setAddress('${j.id}',this.value)" placeholder="📍 Job address — for maps & directions"/>`;
  const note = usingTitle ? `<div class="hint" style="margin-top:4px">Using the project name for directions — add a different address only if needed.</div>` : '';
  if(!loc) return `<div class="addrrow">${input}</div>`;
  const m=mapsLinks(loc);
  return `<div class="addrrow">${input}${note}<div class="addrlinks">`
    +`<a class="maplink" href="${m.map}" target="_blank" rel="noopener">📍 Map</a>`
    +`<a class="maplink" href="${m.dir}" target="_blank" rel="noopener">🧭 Directions</a>`
    +`<a class="maplink" href="${m.sv}" target="_blank" rel="noopener">👁 Street View</a></div></div>`;
}
// Daily-route card (used in the Scheduled tab): job + its address + one-tap directions.
function routeCardHTML(j){
  const m=jobLocation(j)?mapsLinks(jobLocation(j)):null;
  return `<div class="routecard">
    <button class="routemain" onclick="go('job','${j.id}')">
      <div class="jt">${esc(j.title)||'Untitled job'}</div>
      <div class="jm">${j.scheduled_date?`📅 ${fmtDate(j.scheduled_date)} · `:''}${j.address?esc(j.address):'<span style="color:var(--muted)">No address yet</span>'}</div>
    </button>
    ${m?`<a class="btn blue sm routedir" href="${m.dir}" target="_blank" rel="noopener">🧭</a>`:''}
  </div>`;
}

// Run the AI on an existing job's captured text and fill in lines/rooms/totals.
async function rebuildWithAI(id, btn){
  const j=JOBS.find(x=>x.id===id); if(!j) return;
  if(!entitled()){ go('paywall'); return; }
  const text=String(j.transcript||'').trim();
  if(!text){ alert('Add the captured conversation in the box above first.'); return; }
  if(!online){ alert('The AI build needs an internet connection.'); return; }
  if((j.lines||[]).some(l=>l.desc||l.price||l.hours||l.rate)
     && !confirm('This replaces the current line items with a fresh AI draft. Continue?')){ return; }
  const orig = btn ? btn.textContent : '';
  if(btn){ btn.disabled=true; btn.textContent='Building…'; }
  try{
    const data = await api('/api/assist/build',{ method:'POST', body:JSON.stringify({ text, from_lang:j.from, to_lang:j.to }) });
    j.translation = data.translation || j.translation || '';
    j.summary = data.summary || '';
    j.lines = (Array.isArray(data.lines)?data.lines:[]).slice(0,12).map(l=>({
      id:uid(), section:String(l.section||'').slice(0,80), desc:String(l.desc||'').slice(0,120),
      type:(l.type==='hourly'?'hourly':'fixed'),
      price:+l.price||0, hours:+l.hours||0, rate:+l.rate||0, furn:'you'
    }));
    j.upgrades = (Array.isArray(data.upgrades)?data.upgrades:[]).slice(0,4).map(u=>({id:uid(),desc:String(u.desc||''),price:+u.price||0}));
    j.assumptions = (Array.isArray(data.assumptions)?data.assumptions:[]).map(String);
    j.exclusions = (Array.isArray(data.exclusions)?data.exclusions:[]).map(String);
    touch(j); saveJobs();
    state.bidTab='build'; render(); window.scrollTo(0,0);
  }catch(e){
    if(e.status===402){ gate402(e); return; }
    if(btn){ btn.disabled=false; btn.textContent=orig||'🪄 Build the bid from this text'; }
    alert(e.code==='AI_UNCONFIGURED'
      ? 'The AI build isn’t switched on yet — add your ANTHROPIC_API_KEY in the app settings to enable it.'
      : ('Could not build the draft: '+(e.message||'error')));
  }
}

async function buildFromConversation(){
  if(!entitled()){ go('paywall'); return; }
  const f=newJobFromForm();
  if(!f.text){ state.error='Add the conversation first, or choose “build manually”.'; render(); return; }
  if(!online){ state.error='You’re offline — the AI build needs a connection. Your job will be created so you can fill it in by hand now and build later.'; const job=makeLocalJob(f,null); JOBS.unshift(job); saveJobs(); state.bidTab='notebook'; go('job',job.id); return; }
  state.loading=true; state.error=''; render();
  let data=null;
  try{
    data = await api('/api/assist/build',{ method:'POST', body:JSON.stringify({ text:f.text, from_lang:f.from, to_lang:f.to }) });
  }catch(e){
    if(e.status===402){ state.loading=false; gate402(e); return; }
    data=null;
    state.error = e.code==='AI_UNCONFIGURED'
      ? 'The AI build isn’t set up on the server yet — your job was created, fill it in by hand.'
      : 'Could not build the draft ('+(e.message||'error')+'). Your job was created — you can fill it in by hand.';
  }
  const job=makeLocalJob(f, data);
  JOBS.unshift(job); saveJobs();
  state.loading=false; state.bidTab='notebook'; go('job',job.id);
}

function lineAmt(l){ return l.type==='hourly' ? (+l.hours||0)*(+l.rate||0) : (+l.price||0); }
function bidTotal(j){ return (j.lines||[]).filter(l=>l.furn!=='client').reduce((s,l)=>s+lineAmt(l),0); }
// Mirror of server proposal.js: group scope lines by room/area, in first-seen order.
function groupSections(lines){
  const groups=[], byName={};
  (lines||[]).forEach(l=>{ const name=String(l.section||'').trim();
    if(!byName[name]){ byName[name]={name,lines:[],subtotal:0}; byName[name]._k=groups.length; groups.push(byName[name]); }
    byName[name].lines.push(l); byName[name].subtotal+=lineAmt(l);
  });
  return groups;
}
// Only worth showing headings/subtotals when the job spans more than one room.
function jobHasSections(lines){
  const named={}; let blank=false;
  (lines||[]).forEach(l=>{ const n=String(l.section||'').trim(); if(n) named[n]=1; else blank=true; });
  const k=Object.keys(named).length; return k>1 || (k===1 && blank);
}

// Share a bid via the phone's own Messages / email (free — sends from the
// contractor's number/email). Gets a secure public link from the server first.
async function shareBid(mode, btn){
  const j=currentJob(); if(!j) return;
  if(!entitled()){ go('paywall'); return; }
  if(!online || !TOKEN){ alert('Connect to the internet to create a shareable bid link.'); return; }
  const orig = btn ? btn.textContent : '';
  if(btn){ btn.disabled=true; btn.textContent='Preparing…'; }
  try{
    j.status='sent'; touch(j); persist();
    await syncNow(true); // make sure the server has the latest bid before it renders the link
    const r = await api('/api/jobs/'+j.id+'/share');
    const url = r.url;
    const who = SETTINGS.company || 'your contractor';
    const msg = `Here's your estimate from ${who}: ${url}`;
    const subject = 'Your estimate'+(j.title?(' — '+j.title):'');
    if(btn){ btn.disabled=false; btn.textContent=orig; }
    if(mode==='text'){ location.href='sms:?&body='+encodeURIComponent(msg); }
    else if(mode==='email'){ location.href='mailto:?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(msg); }
    else if(navigator.share){ try{ await navigator.share({title:subject, text:`Here's your estimate from ${who}`, url}); }catch(e){} }
    else { prompt('Copy this link to share the bid:', url); }
  }catch(e){
    if(btn){ btn.disabled=false; btn.textContent=orig; }
    if(e.status===402){ gate402(e); return; }
    alert(e.message||'Could not create the share link.');
  }
}

async function sendPDF(){
  const j=currentJob(); if(!j) return;
  if(!entitled()){ go('paywall'); return; }
  const btn=document.getElementById('pdfBtn');
  // mark as sent + ensure the server has the latest version before it renders
  j.status='sent'; touch(j); persist();
  if(online && TOKEN){
    if(btn){ btn.disabled=true; btn.textContent='Preparing…'; }
    try{
      await syncNow(true);
      const res = await fetch(API+'/api/jobs/'+j.id+'/pdf', { headers:{'Authorization':'Bearer '+TOKEN} });
      if(res.status===402){ if(btn){ btn.disabled=false; btn.textContent='Save / Send PDF'; } await loadBilling(); go('paywall'); return; }
      if(!res.ok) throw new Error('pdf '+res.status);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
      setTimeout(()=>URL.revokeObjectURL(url), 60000);
      if(btn){ btn.disabled=false; btn.textContent='Save / Send PDF'; }
      return;
    }catch(e){ if(btn){ btn.disabled=false; btn.textContent='Save / Send PDF'; } }
  }
  // Offline / failed → browser print fallback (spec allows this).
  printClient();
}
function printClient(){
  const j=currentJob(); if(!j) return;
  document.getElementById('printArea').innerHTML = clientHTML(j);
  window.print();
}

    <div class="row2">
      <div><label class="fld">Default — you speak</label><select class="input" onchange="setS('from',this.value)">${langOpts(SETTINGS.from)}</select></div>
      <div><label class="fld">Default — client reads</label><select class="input" onchange="setS('to',this.value)">${langOpts(SETTINGS.to)}</select></div>

        <div><input id="pwNew2" type="password" class="input" placeholder="Confirm new password" autocomplete="new-password"/></div>
      </div>
      <div id="pwMsg" class="hint" style="margin-top:8px"></div>

    </div>
    <div class="legalbox">
      <h3>Terms &amp; privacy (placeholder)</h3>
      <p>Conversations, transcripts, photos, and bids you create belong to you. They're stored for your use, and you can delete them at any time. Bidtranslator is a tool for preparing estimates — bids you send are agreements between you and your client, not us.</p>
      <p>Where your area requires it, let the other party know when a conversation is being captured.</p>
      <label style="display:flex;gap:10px;align-items:flex-start;font-size:.86rem;color:#cdc7bb;cursor:pointer;margin-top:6px">

}
let setT;
function setS(k,v){ SETTINGS[k]=v; persistSettings(); settingsDirty=true; paintSync(); clearTimeout(setT); setT=setTimeout(()=>syncNow(), 700); }

// Resize the chosen image to a small data-URI so it stays well under the server's
// limit, then save it like any other setting. PNG keeps logo transparency; if it
// comes out large we fall back to JPEG.
function uploadLogo(input){
  const f=input.files&&input.files[0]; if(!f) return;
  if(!/^image\//.test(f.type)){ alert('Please choose an image file.'); return; }
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=320; let w=img.width||1, h=img.height||1;
      if(w>max||h>max){ const s=Math.min(max/w,max/h); w=Math.round(w*s); h=Math.round(h*s); }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      let data=c.toDataURL('image/png');
      if(data.length>180000) data=c.toDataURL('image/jpeg',0.85);
      if(data.length>240000){ alert('That image is too detailed — try a simpler or smaller logo.'); return; }
      setS('logo',data); render();
    };
    img.onerror=()=>alert('Could not read that image.');
    img.src=e.target.result;
  };
  reader.readAsDataURL(f);
}
function removeLogo(){ setS('logo',''); render(); }

async function changePw(btn){
  const g=id=>{ const e=document.getElementById(id); return e?e.value:''; };
  const msg=document.getElementById('pwMsg');
  const show=(t,ok)=>{ if(msg){ msg.textContent=t; msg.style.color=ok?'#8fce8f':'#e88'; } };
  const cur=g('pwCur'), n1=g('pwNew'), n2=g('pwNew2');
  if(!cur||!n1){ show('Fill in your current and new password.'); return; }
  if(n1.length<8){ show('New password must be at least 8 characters.'); return; }
  if(n1!==n2){ show('The new passwords don’t match.'); return; }
  if(!online||!TOKEN){ show('You need to be online and signed in to change your password.'); return; }
  btn.disabled=true; show('Updating…', true);
  try{
    await api('/api/auth/change-password',{method:'POST', body:JSON.stringify({currentPassword:cur, newPassword:n1})});
    show('Password updated. ✓', true);
    ['pwCur','pwNew','pwNew2'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
  }catch(e){
    show(e.message||'Could not update password.');
  }finally{ btn.disabled=false; }
}

/* ---------- mutations ---------- */
function addLine(){ const j=currentJob(); j.lines.push({id:uid(),desc:'',type:'fixed',price:0,hours:0,rate:0,furn:'you'}); touch(j); saveJobs(); render(); }
function delLine(id){ const j=currentJob(); j.lines=j.lines.filter(l=>l.id!==id); touch(j); saveJobs(); render(); }
function updLine(id,k,v){ const j=currentJob(); const l=j.lines.find(x=>x.id===id); if(!l)return;
  if(k==='price'||k==='hours'||k==='rate') l[k]=+v||0; else l[k]=v;
  touch(j); saveJobs();
  if(k==='type'||k==='furn'||k==='section') render(); else refreshTotals(j);
}
function addUp(){ const j=currentJob(); j.upgrades.push({id:uid(),desc:'',price:0}); touch(j); saveJobs(); render(); }
function delUp(i){ const j=currentJob(); j.upgrades.splice(i,1); touch(j); saveJobs(); render(); }
function updUp(i,k,v){ const j=currentJob(); if(k==='price') j.upgrades[i][k]=+v||0; else j.upgrades[i][k]=v; touch(j); saveJobs(); }
function updJob(k,v){ const j=currentJob(); j[k]=(k==='margin'||k==='deposit_pct')?(+v||0):v; touch(j); saveJobs(); if(k==='margin') refreshTotals(j); }
function updList(k,v){ const j=currentJob(); j[k]=String(v).split('\n').map(s=>s.trim()).filter(Boolean); touch(j); saveJobs(); }
function deleteJob(id){
  if(!confirm('Delete this job? This removes it from all your devices.')) return;
  const j=JOBS.find(x=>x.id===id); if(!j) return;
  j._deleted=true; j._dirty=true; persist();
  state.view='home'; render(); syncNow();
}

function refreshTotals(j){
  const tot=document.querySelector('.totbar .tv'); if(tot) tot.textContent=money(bidTotal(j));
  (j.lines||[]).forEach(l=>{ const el=document.querySelector('.lt-amt[data-lid="'+l.id+'"]'); if(el) el.textContent = l.furn==='client'?'by client':money(lineAmt(l)); });
}

/* ---------- helpers ---------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escAttr(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- voice dictation ---------- */
let rec=null, recording=false;
function speechSupported(){ return ('webkitSpeechRecognition' in window) || ('SpeechRecognition' in window); }
function updateMic(){ const b=document.getElementById('micBtn'); if(!b)return; b.classList.toggle('rec',recording); const l=b.querySelector('.lbl'); if(l) l.textContent=recording?'Stop':'Dictate'; }
function toggleMic(){
  if(!speechSupported()) return;
  if(recording){ if(rec) rec.stop(); recording=false; updateMic(); return; }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  rec=new SR();
  const sel=document.getElementById('capFrom');
  rec.lang=SPEECH_LANG[sel?sel.value:'es']||'es-US';
  rec.continuous=true; rec.interimResults=true;
  // Snapshot whatever's already in the box, then REBUILD from the live results
  // on every event (instead of appending). Some mobile browsers re-fire the same
  // finalized phrase repeatedly; rebuilding-and-setting means a phrase can never
  // get stacked over and over.
  const ta0=document.getElementById('capText');
  const dictBase=ta0&&ta0.value?ta0.value.trim():'';
  rec.onresult=(e)=>{
    let speech='';
    for(let i=0;i<e.results.length;i++){ speech+=e.results[i][0].transcript+' '; }
    const ta=document.getElementById('capText');
    if(ta) ta.value=[dictBase, speech.trim()].filter(Boolean).join(' ').replace(/\s+/g,' ');
  };
  rec.onend=()=>{ recording=false; updateMic(); };
  rec.onerror=()=>{ recording=false; updateMic(); };
  try{ rec.start(); recording=true; updateMic(); }catch(e){ recording=false; updateMic(); }
}

/* ---------- photos (offline-capable: queued locally, uploaded on sync) ---------- */
function pickPhoto(mode){ const el=document.getElementById(mode==='cam'?'photoCamInput':'photoInput'); if(el) el.click(); }
async function handlePhotos(input){
  const j=currentJob(); if(!j) return; j.photos=j.photos||[];
  const files=Array.from(input.files||[]);
  for(const f of files){ if(j.photos.length>=8) break; try{ const dataUrl=await downscale(f); j.photos.push({localId:uid(), dataUrl, _pending:true}); }catch(e){} }
  input.value=''; touch(j); saveJobs(); render();
}
function downscale(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{ const img=new Image();
      img.onload=()=>{ const max=900; let w=img.width,h=img.height;
        if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',0.7)); };
      img.onerror=rej; img.src=r.result; };
    r.onerror=rej; r.readAsDataURL(file);
  });
}
async function delPhoto(i){
  const j=currentJob(); if(!j)return; const p=j.photos[i]; if(!p) return;
  if(p.id && !p._pending && online && TOKEN){ try{ await api('/api/jobs/'+j.id+'/photos/'+p.id,{method:'DELETE'}); }catch(e){} }
  j.photos.splice(i,1); touch(j); saveJobs(); render();
}

/* ---------- capture-screen photos (staged before the job exists, then handed
   to the new job as pending uploads — no full re-render, to preserve typing) ---------- */
function capPhotoThumbs(){
  return CAP_PHOTOS.map((p,i)=>`<div class="thumb"><img src="${p.dataUrl}" alt="job photo"/><button class="x" onclick="capDelPhoto(${i})" title="Remove">✕</button></div>`).join('')
    + `<button class="addphoto" onclick="capPickPhoto('cam')"><span style="font-size:1.2rem;line-height:1">📷</span>Camera</button>`
    + `<button class="addphoto" onclick="capPickPhoto('lib')"><span style="font-size:1.2rem;line-height:1">🖼️</span>Upload</button>`;
}
function renderCapPhotos(){ const g=document.getElementById('capPhotoGrid'); if(g) g.innerHTML=capPhotoThumbs(); }
function capPickPhoto(mode){ const el=document.getElementById(mode==='cam'?'capPhotoCamInput':'capPhotoInput'); if(el) el.click(); }
async function capHandlePhotos(input){
  const files=Array.from(input.files||[]);
  for(const f of files){ if(CAP_PHOTOS.length>=8) break; try{ const dataUrl=await downscale(f); CAP_PHOTOS.push({localId:uid(), dataUrl, _pending:true}); }catch(e){} }
  input.value=''; renderCapPhotos();
}
function capDelPhoto(i){ CAP_PHOTOS.splice(i,1); renderCapPhotos(); }

/* ============ boot ============ */
(async function(){
  state.booted=true;
  // Returning from Stripe Checkout / portal: clean the URL and refresh status.
  const params=new URLSearchParams(location.search);
  const billingReturn=params.get('billing');
  const paymentsReturn=params.get('payments'); // 'connected' | 'refresh' after Stripe onboarding
  if(billingReturn || paymentsReturn){ history.replaceState({}, '', location.pathname); }
  render();
  if(TOKEN){
    await Promise.all([syncNow(true), loadBilling(), loadPayments(), loadMe()]);
    // Coming back from Stripe Connect onboarding — pull the fresh account status
    // and land the contractor on Setup so they see "Ready".
    if(paymentsReturn){ await refreshPayments(); state.view='settings'; }
    if(billingReturn==='success'){ state.view='home'; }
    render();
  }
})();
</script>
